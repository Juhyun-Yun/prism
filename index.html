        // ============================================================
        //  FOLDABLE PRISM - Three.js로 각기둥 전개도가 접히는 애니메이션
        // ============================================================
        function FoldablePrism({ n, progress }) {
            const mountRef = useRef(null);
            const stateRef = useRef({});

            useEffect(() => {
                let renderer, scene, camera, frameId, ro;
                let isMounted = true;
                let initialized = false;
                const disposables = [];
                let sideMeshes = [];
                let baseMeshes = [];
                const r = 1.2;
                const ht = 2.3;
                const sideLen = 2 * r * Math.sin(Math.PI / n);
                const apothem = r * Math.cos(Math.PI / n);

                const initThree = (w, h) => {
                    if (initialized || !mountRef.current) return;
                    while (mountRef.current.firstChild) {
                        try { mountRef.current.removeChild(mountRef.current.firstChild); } catch (e) { break; }
                    }
                    scene = new THREE.Scene();
                    scene.background = null;
                    // 카메라를 더 멀리 + 넓은 FOV로 → 펼친 전개도가 잘리지 않음
                    camera = new THREE.PerspectiveCamera(38, w / h, 0.1, 1000);
                    camera.position.set(0, 1.3, 11);
                    camera.lookAt(0, 0, 0);

                    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                    renderer.setPixelRatio(window.devicePixelRatio);
                    renderer.setSize(w, h);
                    mountRef.current.appendChild(renderer.domElement);
                    scene.add(new THREE.AmbientLight(0xffffff, 1.0));

                    // 옆면 머티리얼 (연한 초록 fill + 어두운 초록 테두리)
                    const sideMat = new THREE.MeshBasicMaterial({
                        color: 0xa7f3d0, side: THREE.DoubleSide,
                        transparent: true, opacity: 0.9,
                        polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
                    });
                    disposables.push(sideMat);
                    const sideEdgeMat = new THREE.LineBasicMaterial({ color: 0x065f46, linewidth: 2 });
                    disposables.push(sideEdgeMat);

                    // 밑면 머티리얼 (연한 노란 fill + 갈색 테두리)
                    const baseMat = new THREE.MeshBasicMaterial({
                        color: 0xfde68a, side: THREE.DoubleSide,
                        transparent: true, opacity: 0.9,
                        polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
                    });
                    disposables.push(baseMat);
                    const baseEdgeMat = new THREE.LineBasicMaterial({ color: 0x92400e, linewidth: 2 });
                    disposables.push(baseEdgeMat);

                    // 회전 받는 sceneRoot
                    const sceneRoot = new THREE.Group();
                    scene.add(sceneRoot);
                    sceneRoot.rotation.y = 0.4;
                    sceneRoot.rotation.x = 0.15;

                    // wrapper: 도형 중심 정렬용 (펼친/접힌 상태 lerp으로 위치)
                    const wrapper = new THREE.Group();
                    sceneRoot.add(wrapper);
                    stateRef.current.wrapper = wrapper;

                    // 옆면들을 hierarchical chain으로 구성 (진짜 hinge 접기)
                    // sideGroups[0]은 wrapper의 자식
                    // sideGroups[i]는 sideGroups[i-1]의 자식 (position.x = sideLen → 인접 hinge)
                    const planeGeo = new THREE.PlaneGeometry(sideLen, ht);
                    disposables.push(planeGeo);
                    const planeEdgeGeo = new THREE.EdgesGeometry(planeGeo);
                    disposables.push(planeEdgeGeo);

                    let parentForSides = wrapper;
                    for (let i = 0; i < n; i++) {
                        const sg = new THREE.Group();
                        if (i > 0) sg.position.x = sideLen; // 이전 옆면 오른쪽 변 = 이 옆면 왼쪽 변 (hinge)
                        parentForSides.add(sg);

                        const m = new THREE.Mesh(planeGeo, sideMat);
                        m.position.x = sideLen / 2; // mesh center가 group origin에서 +X 방향 sideLen/2
                        sg.add(m);
                        const el = new THREE.LineSegments(planeEdgeGeo, sideEdgeMat);
                        el.position.x = sideLen / 2;
                        sg.add(el);

                        sideMeshes.push(sg);
                        parentForSides = sg; // 다음 옆면은 이 옆면의 자식
                    }

                    // 밑면: sideGroups[0]에 hinge로 연결
                    // 위쪽 밑면: side 0의 위 변(Y=ht/2)을 hinge
                    // 아래쪽 밑면: side 0의 아래 변(Y=-ht/2)을 hinge
                    const baseGeoHinge = createNgonForHinge(r, n);
                    disposables.push(baseGeoHinge);
                    const baseEdgeGeoHinge = new THREE.EdgesGeometry(baseGeoHinge);
                    disposables.push(baseEdgeGeoHinge);

                    const topBaseGroup = new THREE.Group();
                    topBaseGroup.position.set(sideLen / 2, ht / 2, 0); // side 0 위 변 중심
                    sideMeshes[0].add(topBaseGroup);
                    topBaseGroup.add(new THREE.Mesh(baseGeoHinge, baseMat));
                    topBaseGroup.add(new THREE.LineSegments(baseEdgeGeoHinge, baseEdgeMat));
                    baseMeshes.push({ group: topBaseGroup, type: 'top' });

                    const botBaseGroup = new THREE.Group();
                    botBaseGroup.position.set(sideLen / 2, -ht / 2, 0); // side 0 아래 변 중심
                    botBaseGroup.scale.y = -1; // 아래쪽은 거꾸로 (Y+ 방향이 아닌 Y- 방향으로 연장되어야)
                    sideMeshes[0].add(botBaseGroup);
                    botBaseGroup.add(new THREE.Mesh(baseGeoHinge, baseMat));
                    botBaseGroup.add(new THREE.LineSegments(baseEdgeGeoHinge, baseEdgeMat));
                    baseMeshes.push({ group: botBaseGroup, type: 'bot' });

                    let isDragging = false;
                    let prev = { x: 0, y: 0 };
                    const getXY = (e) => ({
                        x: e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0].clientX),
                        y: e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0].clientY)
                    });
                    const onStart = (e) => { isDragging = true; prev = getXY(e); e.preventDefault && e.preventDefault(); };
                    const onMove = (e) => {
                        if (!isDragging) return;
                        const xy = getXY(e);
                        sceneRoot.rotation.y += (xy.x - prev.x) * 0.01;
                        sceneRoot.rotation.x += (xy.y - prev.y) * 0.01;
                        prev = xy;
                    };
                    const onEnd = () => { isDragging = false; };
                    const el = mountRef.current;
                    el.addEventListener('mousedown', onStart);
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onEnd);
                    el.addEventListener('touchstart', onStart, { passive: false });
                    window.addEventListener('touchmove', onMove, { passive: false });
                    window.addEventListener('touchend', onEnd);

                    stateRef.current.sideMeshes = sideMeshes;
                    stateRef.current.baseMeshes = baseMeshes;
                    stateRef.current.sceneRoot = sceneRoot;
                    stateRef.current.renderer = renderer;
                    stateRef.current.scene = scene;
                    stateRef.current.camera = camera;

                    const animate = () => {
                        if (renderer && scene && camera) renderer.render(scene, camera);
                        frameId = requestAnimationFrame(animate);
                    };
                    animate();

                    // 첫 진행도 적용
                    applyProgress(stateRef.current.progress ?? progress);

                    stateRef.current.cleanup = () => {
                        try { el.removeEventListener('mousedown', onStart); } catch (e) {}
                        window.removeEventListener('mousemove', onMove);
                        window.removeEventListener('mouseup', onEnd);
                        try { el.removeEventListener('touchstart', onStart); } catch (e) {}
                        window.removeEventListener('touchmove', onMove);
                        window.removeEventListener('touchend', onEnd);
                        cancelAnimationFrame(frameId);
                        disposables.forEach(d => { try { d.dispose && d.dispose(); } catch (e) {} });
                        if (renderer) {
                            try { renderer.dispose(); } catch (e) {}
                            try { if (renderer.forceContextLoss) renderer.forceContextLoss(); } catch (e) {}
                            // DOM 제거는 React에 맡김 (wrapper div unmount 시 자동 정리됨)
                            // 직접 removeChild 호출하지 않음 - React와 충돌 방지
                            renderer = null;
                        }
                    };
                    initialized = true;
                };

                const applyProgress = (p) => {
                    if (!sideMeshes.length || !stateRef.current.wrapper) return;
                    const wrap = stateRef.current.wrapper;
                    const foldAngle = 2 * Math.PI / n; // 인접 옆면 외각
                    // 옆면 hierarchical 회전: sideGroups[i] (i>=1) rotation.y = -p * foldAngle
                    // sideGroups[0]은 chain의 시작이라 회전 없음
                    for (let i = 1; i < sideMeshes.length; i++) {
                        sideMeshes[i].rotation.y = -p * foldAngle;
                    }
                    // 밑면 hinge 회전: 펼친(rotation.x=0 → polygon이 XY 평면, side mesh와 같이 평평) ↔ 접힌(rotation.x=π/2 → polygon이 도형 내부로 접힘)
                    // 위쪽 밑면: polygon이 +Y 방향. rotation.x = +π/2면 +Y → -Z (도형 안쪽으로 접힘 = 위에서 덮음)
                    // 아래쪽 밑면: scale.y=-1로 polygon이 -Y 방향. rotation.x = +π/2면 -Y → +Z. 하지만 우리는 도형 안쪽(-Z)으로 가야 함 → rotation.x = -π/2
                    if (baseMeshes[0]) {
                        baseMeshes[0].group.rotation.x = p * (Math.PI / 2);
                    }
                    if (baseMeshes[1]) {
                        baseMeshes[1].group.rotation.x = -p * (Math.PI / 2);
                    }
                    // wrapper 위치 lerp: 도형 중심을 화면 가운데로
                    // 펼친 상태: 옆면들이 X+ 방향으로 일렬. side[0] 왼쪽 모서리가 wrapper origin.
                    //   가운데 정렬: wrapper.position.x = -(n * sideLen) / 2
                    // 접힌 상태: 옆면들이 둘레 형성. 도형 중심(평균)이 (cos(π/n)*apothem, 0, -sin(π/n)*apothem) 방향에 있음
                    //   계산 단순화: hierarchical chain으로 옆면 i mesh center 위치 평균을 wrapper.position 보정으로 0에 맞춤
                    const flatX = -(n * sideLen) / 2;
                    // 접힌 상태 도형 중심 - 시각적 보정값 (실험적)
                    const folX = -apothem * Math.sin(Math.PI / n);
                    const folZ = -apothem * (1 - Math.cos(Math.PI / n));
                    wrap.position.x = flatX + p * (folX - flatX);
                    wrap.position.z = p * folZ;
                };

                stateRef.current.applyProgress = applyProgress;
                stateRef.current.progress = progress;

                const tryInit = () => {
                    if (!isMounted || initialized || !mountRef.current) return;
                    const w = mountRef.current.clientWidth;
                    const h = mountRef.current.clientHeight;
                    if (w > 0 && h > 0) initThree(w, h);
                    else frameId = requestAnimationFrame(tryInit);
                };
                tryInit();

                if (typeof ResizeObserver !== 'undefined' && mountRef.current) {
                    ro = new ResizeObserver(() => {
                        if (!isMounted || !mountRef.current) return;
                        const w = mountRef.current.clientWidth;
                        const h = mountRef.current.clientHeight;
                        if (!initialized && w > 0 && h > 0) initThree(w, h);
                        else if (initialized && camera && renderer && w > 0 && h > 0) {
                            camera.aspect = w / h;
                            camera.updateProjectionMatrix();
                            renderer.setSize(w, h);
                        }
                    });
                    ro.observe(mountRef.current);
                }

                return () => {
                    isMounted = false;
                    if (ro) ro.disconnect();
                    if (stateRef.current.cleanup) stateRef.current.cleanup();
                };
            }, [n]);

            // progress 변경 시 즉시 반영 (재마운트 없이)
            useEffect(() => {
                stateRef.current.progress = progress;
                if (stateRef.current.applyProgress) stateRef.current.applyProgress(progress);
            }, [progress]);

            return <div ref={mountRef} className="w-full h-full cursor-grab active:cursor-grabbing" dangerouslySetInnerHTML={{__html: ''}} />;
        }

        // ============================================================
        //   MISSION 5: 전개도 공방
        // ============================================================
        function NetView({ onComplete, onBack }) {
            const TOTAL = 2;
            const [page, setPage] = useState(1);
            const [n, setN] = useState(3);
            const [progress, setProgress] = useState(1); // 0=완전 펼친 전개도, 1=완전 접힌 입체도형
            const [quiz, setQuiz] = useState({ baseCount: '', sideCount: '', shape: '' });
            const [popup, setPopup] = useState(null);
            const [verified, setVerified] = useState(false);

            const shape = PRISMS.find(s => s.n === n) || PRISMS[0];

            const animRef = useRef(null);
            const animateProgress = (target) => {
                if (animRef.current) cancelAnimationFrame(animRef.current);
                const start = performance.now();
                const initial = progress;
                const duration = 1100;
                const tick = (now) => {
                    const t = Math.min(1, (now - start) / duration);
                    // ease in-out
                    const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                    const p = initial + (target - initial) * eased;
                    setProgress(p);
                    if (t < 1) animRef.current = requestAnimationFrame(tick);
                };
                animRef.current = requestAnimationFrame(tick);
            };

            const checkQuiz = () => {
                const bc = parseInt(quiz.baseCount);
                const sc = parseInt(quiz.sideCount);
                const sh = onlyKorean(quiz.shape);
                if (bc === 2 && sc === n && sh === '직사각형') {
                    setPopup({ type: 'success', msg: '훌륭해요! 🎉\n전개도의 구성을\n정확히 알고 있어요!' });
                    setVerified(true);
                } else {
                    setPopup({ type: 'error', msg: '힌트:\n각기둥의 전개도는\n2개의 밑면(같은 모양)과\n밑면의 변의 개수만큼의\n옆면(직사각형)으로 이루어져 있어요.' });
                }
            };

            // 정확한 SVG 전개도 - 외곽선과 점선이 절대 겹치지 않게
            // 옆면은 fill만, 외곽선은 path로 별도 (옆면 사이 세로변/접는 변 제외)
            const renderNet = () => {
                const r = 50;
                const sideLen = 2 * r * Math.sin(Math.PI / n);
                const sideH = 130;
                const apothem = r * Math.cos(Math.PI / n);
                const totalSideW = sideLen * n;
                const pad = 24;
                const svgW = totalSideW + 2 * pad;
                const svgH = sideH + 2 * (r + 10) + 2 * pad;
                const startX = pad;
                const startY = pad + r + 10;
                const baseCenterX = startX + sideLen / 2;
                const topBaseCy = startY - apothem;
                const botBaseCy = startY + sideH + apothem;

                // 옆면 fill (stroke 없음)
                const sideFills = [];
                for (let i = 0; i < n; i++) {
                    sideFills.push(
                        <rect key={`f-${i}`} x={startX + i * sideLen} y={startY} width={sideLen} height={sideH}
                            fill="#a7f3d0" stroke="none" />
                    );
                    sideFills.push(
                        <text key={`t-${i}`} x={startX + i * sideLen + sideLen/2} y={startY + sideH/2 + 6}
                            textAnchor="middle" fontSize="15" fill="#065f46" fontWeight="bold">옆면{i+1}</text>
                    );
                }

                // 옆면 영역의 외곽선: 첫 옆면 위/아래 변 제외 (접는 선 점선이 그 자리)
                // 즉 외곽 = 왼쪽 변(side 0 왼변) + 위 변(side 1부터 마지막까지) + 오른쪽 변 + 아래 변(side 1부터 마지막까지)
                const outlinePath = `
                    M ${startX} ${startY}
                    L ${startX} ${startY + sideH}
                    M ${startX + sideLen} ${startY + sideH}
                    L ${startX + totalSideW} ${startY + sideH}
                    L ${startX + totalSideW} ${startY}
                    L ${startX + sideLen} ${startY}
                `;

                // n각형 밑면 그리기 (한 변이 아래쪽에 있도록)
                const baseAngle = n % 2 === 0 ? -Math.PI / 2 - Math.PI / n : -Math.PI / 2;
                const polyPoints = (cx, cy, flip) => {
                    const pts = [];
                    for (let i = 0; i < n; i++) {
                        const a = (i / n) * Math.PI * 2 + baseAngle + (flip ? Math.PI : 0);
                        pts.push(`${cx + Math.cos(a) * r},${cy + Math.sin(a) * r}`);
                    }
                    return pts.join(' ');
                };

                return (
                    <svg viewBox={`0 0 ${svgW} ${svgH}`} className="w-full h-full" preserveAspectRatio="xMidYMid meet">
                        {/* 옆면 fill */}
                        {sideFills}
                        {/* 밑면 (위) - fill만 */}
                        <polygon points={polyPoints(baseCenterX, topBaseCy, false)} fill="#fde68a" stroke="none" />
                        <text x={baseCenterX} y={topBaseCy + 5} textAnchor="middle" fontSize="15" fill="#92400e" fontWeight="bold">밑면</text>
                        {/* 밑면 (아래) - fill만 */}
                        <polygon points={polyPoints(baseCenterX, botBaseCy, true)} fill="#fde68a" stroke="none" />
                        <text x={baseCenterX} y={botBaseCy + 5} textAnchor="middle" fontSize="15" fill="#92400e" fontWeight="bold">밑면</text>
                        {/* 옆면 영역 외곽선 (path, 실선) - 점선 자리는 제외 */}
                        <path d={outlinePath} stroke="#065f46" strokeWidth="2.5" fill="none" />
                        {/* 밑면 외곽선 (실선) - 단, 옆면과 닿는 변은 제외 */}
                        {(() => {
                            // 위쪽 밑면: 옆면 위변과 닿는 변(첫 변) 제외
                            const ptsArr = [];
                            for (let i = 0; i < n; i++) {
                                const a = (i / n) * Math.PI * 2 + baseAngle;
                                ptsArr.push([baseCenterX + Math.cos(a) * r, topBaseCy + Math.sin(a) * r]);
                            }
                            // 첫 번째 변 = ptsArr[0] -> ptsArr[1] 가 옆면과 닿는 변 (가장 아래쪽 변)
                            // baseAngle 설정상 i=0 정점이 가장 아래쪽 변의 한 끝점
                            // 실제로 polygon의 한 변이 아래쪽이 되도록 baseAngle 설정. 그 변의 정점 인덱스 찾기
                            // baseAngle 설정시 각도 계산:
                            //   홀수 n: baseAngle = -π/2 → i=0이 위쪽 점. 변 i (i와 i+1 정점)의 중심 각도 = baseAngle + (i+0.5)*2π/n
                            //   변이 아래쪽(각도 π/2)에 오려면 i = (n-1)/2 (홀수n)
                            //   짝수 n: baseAngle = -π/2 - π/n → i=0이 좌상점. 변 i의 중심 각도 ...
                            // 단순화: 옆면과 닿는 변 인덱스를 직접 찾아 그 변 제외하고 path
                            // 변 j 중심 각도 = baseAngle + (j+0.5)*2π/n. π/2가 되는 j 찾기.
                            // π/2 = baseAngle + (j+0.5)*2π/n → j+0.5 = (π/2 - baseAngle)*n/(2π) → j = (π/2 - baseAngle)*n/(2π) - 0.5
                            const jExclude = Math.round((Math.PI/2 - baseAngle) * n / (2 * Math.PI) - 0.5);
                            const jExc = ((jExclude % n) + n) % n;
                            // path: jExc 변(jExc-jExc+1) 제외하고 path 그림
                            // 시작점 = jExc+1, 종료점 = jExc, 닫지 않음
                            let pathD = '';
                            for (let k = 0; k <= n; k++) {
                                const idx = (jExc + 1 + k) % n;
                                if (k === 0) pathD += `M ${ptsArr[idx][0]} ${ptsArr[idx][1]} `;
                                else if (k < n) pathD += `L ${ptsArr[idx][0]} ${ptsArr[idx][1]} `;
                            }
                            // 같은 방식으로 아래쪽 밑면도
                            const ptsArr2 = [];
                            for (let i = 0; i < n; i++) {
                                const a = (i / n) * Math.PI * 2 + baseAngle + Math.PI;
                                ptsArr2.push([baseCenterX + Math.cos(a) * r, botBaseCy + Math.sin(a) * r]);
                            }
                            // flip된 polygon이므로 baseAngle+π 적용. 옆면과 닿는 변(위쪽 변, 각도 -π/2)
                            const jExclude2 = Math.round((-Math.PI/2 - (baseAngle + Math.PI)) * n / (2 * Math.PI) - 0.5);
                            const jExc2 = ((jExclude2 % n) + n) % n;
                            let pathD2 = '';
                            for (let k = 0; k <= n; k++) {
                                const idx = (jExc2 + 1 + k) % n;
                                if (k === 0) pathD2 += `M ${ptsArr2[idx][0]} ${ptsArr2[idx][1]} `;
                                else if (k < n) pathD2 += `L ${ptsArr2[idx][0]} ${ptsArr2[idx][1]} `;
                            }
                            return (
                                <Fragment>
                                    <path d={pathD} stroke="#92400e" strokeWidth="2.5" fill="none" />
                                    <path d={pathD2} stroke="#92400e" strokeWidth="2.5" fill="none" />
                                </Fragment>
                            );
                        })()}
                        {/* 접는 선 (점선, 빨강) - 옆면들 사이 세로선 (n-1개) */}
                        {[...Array(n - 1)].map((_, i) => (
                            <line key={`v-${i}`}
                                x1={startX + (i+1) * sideLen} y1={startY}
                                x2={startX + (i+1) * sideLen} y2={startY + sideH}
                                stroke="#dc2626" strokeWidth="2" strokeDasharray="6 4" />
                        ))}
                        {/* 위쪽 밑면-옆면 접는 선 */}
                        <line x1={startX} y1={startY} x2={startX + sideLen} y2={startY}
                            stroke="#dc2626" strokeWidth="2" strokeDasharray="6 4" />
                        {/* 아래쪽 옆면-밑면 접는 선 */}
                        <line x1={startX} y1={startY + sideH} x2={startX + sideLen} y2={startY + sideH}
                            stroke="#dc2626" strokeWidth="2" strokeDasharray="6 4" />
                    </svg>
                );
            };

            const pageTitle = page === 1 ? '펼치고 접으며 전개도 확인하기' : '전개도 확인 퀴즈';

            return (
                <div className="h-full flex flex-col p-2 paper-bg overflow-hidden">
                    <Popup {...(popup || {})} onClose={() => setPopup(null)} />

                    {/* 헤더 (한 줄, 컴팩트) */}
                    <div className="bg-white ink-border rounded-xl px-3 py-1 stamp-shadow mb-1 shrink-0 flex items-center gap-2">
                        <button onClick={onBack}
                            className="px-2 py-1 bg-amber-50 ink-border rounded-lg text-amber-800 hover:bg-amber-100 flex items-center gap-1 shrink-0">
                            <Icon name="Home" className="w-4 h-4" />
                            <span className="text-xs font-bold whitespace-nowrap">지도</span>
                        </button>
                        <div className="w-8 h-8 bg-violet-400 rounded-lg flex items-center justify-center text-white shrink-0">
                            <Icon name="BoxSelect" className="w-5 h-5" />
                        </div>
                        <span className="text-xs text-amber-700 font-bold tracking-wider whitespace-nowrap">MISSION 5</span>
                        <h2 className="font-jua text-lg text-amber-900 whitespace-nowrap">{pageTitle}</h2>
                        <div className="flex gap-1.5 flex-1 justify-center">
                            {PRISMS.map(s => (
                                <button key={s.id} onClick={() => { setN(s.n); setVerified(false); setQuiz({ baseCount: '', sideCount: '', shape: '' }); setProgress(1); }}
                                    className={`px-3 py-1 rounded-lg font-jua text-sm ink-border ${n === s.n ? 'bg-violet-500 text-white' : 'bg-white text-amber-800 hover:bg-violet-50'}`}>
                                    {s.name}
                                </button>
                            ))}
                        </div>
                        <div className="px-3 py-1 bg-amber-100 ink-border rounded-full font-jua text-sm text-amber-900 shrink-0 whitespace-nowrap">
                            {page} / {TOTAL} 페이지
                        </div>
                    </div>

                    <AvatarGuide char="master" text={
                        page === 1
                            ? `"여기 ${shape.name}이 있네! [펼치기]를 누르면 오른쪽 도면과 똑같은 전개도로 펼쳐진단다. 펼쳐서 같은 모양인지 확인한 뒤, 다시 [접기]를 눌러 ${shape.name}으로 만들어 보시오!"`
                            : '"전개도가 어떤 면들로 이루어졌는지 확인 문제를 풀어보시오! 밑면의 변 개수와 옆면 개수를 잘 비교해 보시오."'
                    } />

                    {page === 1 ? (
                        <div className="grid grid-cols-3 gap-2 flex-1 min-h-0 mb-1">
                            {/* 좌측: 접기 애니메이션 (큰 사이즈) */}
                            <div className="col-span-2 bg-white ink-border rounded-2xl p-2 stamp-shadow flex flex-col">
                                <div className="flex items-center justify-between mb-1 shrink-0">
                                    <div className="font-jua text-base text-amber-900 whitespace-nowrap">
                                        🔄 {progress < 0.5 ? '펼쳐진 전개도' : progress < 0.95 ? '접히는 중' : `${shape.name}`}
                                    </div>
                                    <div className="flex gap-1">
                                        <button onClick={() => animateProgress(0)}
                                            className={`px-2 py-1 rounded-lg font-jua text-xs ink-border stamp-shadow flex items-center gap-1 ${progress < 0.5 ? 'bg-amber-500 text-white' : 'bg-white text-amber-800 hover:bg-amber-50'}`}>
                                            <Icon name="Maximize2" className="w-3 h-3" /> 펼치기
                                        </button>
                                        <button onClick={() => animateProgress(1)}
                                            className={`px-2 py-1 rounded-lg font-jua text-xs ink-border stamp-shadow flex items-center gap-1 ${progress >= 0.5 ? 'bg-violet-500 text-white' : 'bg-white text-amber-800 hover:bg-violet-50'}`}>
                                            <Icon name="Minimize2" className="w-3 h-3" /> 접기
                                        </button>
                                    </div>
                                </div>
                                <div className="flex-1 bg-violet-50 rounded-xl border-2 border-violet-300 min-h-0">
                                    <FoldablePrism n={n} progress={progress} />
                                </div>
                            </div>
                            {/* 우측: 정확한 SVG 전개도 (참조용) */}
                            <div className="col-span-1 bg-white ink-border rounded-2xl p-2 stamp-shadow flex flex-col">
                                <div className="font-jua text-sm text-amber-900 mb-1 text-center shrink-0 whitespace-nowrap">📄 전개도 (도면)</div>
                                <div className="flex-1 bg-amber-50 rounded-xl border-2 border-amber-300 p-1 min-h-0">
                                    {renderNet()}
                                </div>
                                <div className="mt-1 text-[10px] text-amber-700 text-center shrink-0 leading-tight">
                                    🔴 점선=접는 선 · ⚫ 실선=자르는 변
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="bg-white ink-border rounded-2xl p-4 stamp-shadow flex-1 min-h-0 mb-2 flex flex-col">
                            <h3 className="font-jua text-2xl text-amber-900 mb-2 text-center shrink-0">📝 {shape.name}의 전개도 확인</h3>
                            <p className="text-center text-base text-amber-700 mb-3 shrink-0 font-gaegu text-xl">
                                전개도가 어떻게 구성되어 있는지 적어보세요!
                            </p>
                            <div className="grid grid-cols-3 gap-4 max-w-3xl mx-auto w-full shrink-0">
                                <div>
                                    <label className="text-lg font-jua text-amber-700 text-center block mb-2">밑면 개수</label>
                                    <input type="number" value={quiz.baseCount} disabled={verified}
                                        onChange={e => setQuiz({...quiz, baseCount: e.target.value})}
                                        className="w-full px-2 py-3 bg-amber-50 border-2 border-amber-200 rounded-xl text-center font-bold text-3xl outline-none focus:border-amber-500 disabled:bg-amber-100" />
                                </div>
                                <div>
                                    <label className="text-lg font-jua text-amber-700 text-center block mb-2">옆면 개수</label>
                                    <input type="number" value={quiz.sideCount} disabled={verified}
                                        onChange={e => setQuiz({...quiz, sideCount: e.target.value})}
                                        className="w-full px-2 py-3 bg-amber-50 border-2 border-amber-200 rounded-xl text-center font-bold text-3xl outline-none focus:border-amber-500 disabled:bg-amber-100" />
                                </div>
                                <div>
                                    <label className="text-lg font-jua text-amber-700 text-center block mb-2">옆면 모양</label>
                                    <input type="text" value={quiz.shape} disabled={verified}
                                        onChange={e => setQuiz({...quiz, shape: e.target.value})}
                                        placeholder="직사각형"
                                        className="w-full px-2 py-3 bg-amber-50 border-2 border-amber-200 rounded-xl text-center font-bold text-2xl outline-none focus:border-amber-500 disabled:bg-amber-100" />
                                </div>
                            </div>
                            <div className="max-w-3xl mx-auto w-full mt-4 shrink-0">
                                {!verified ? (
                                    <button onClick={checkQuiz}
                                        className="w-full py-3 bg-violet-600 text-white rounded-xl font-jua text-xl hover:bg-violet-700 stamp-shadow">
                                        전개도 정답 확인
                                    </button>
                                ) : (
                                    <div className="p-3 bg-emerald-100 border-2 border-emerald-400 rounded-xl text-center font-jua text-emerald-800">
                                        <div className="text-2xl mb-1">✨ 전개도 마스터! ✨</div>
                                        <div className="text-lg text-emerald-900 leading-snug break-keep">
                                            🔑 밑면의 변이 <b className="text-rose-700">{n}개</b>라서 옆면도 <b className="text-rose-700">{n}개</b>! 밑면의 변의 개수가 늘어나면 옆면의 개수도 똑같이 늘어나요.
                                        </div>
                                        <div className="text-sm text-emerald-700 mt-1">위에서 다른 각기둥을 골라 직접 확인해 보고, "미션 5 완료" 버튼을 눌러요!</div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <PageNav page={page} total={TOTAL}
                        onPrev={() => setPage(page - 1)} onNext={() => setPage(page + 1)}
                        onComplete={onComplete} canNext={page === 1 ? true : verified}
                        completeColor="bg-violet-700 hover:bg-violet-800"
                        completeLabel="완료" />
                </div>
            );
        }

        // ============================================================
        //               수료증 (도형 마스터 인증)
        // ============================================================
        function CertView({ onReset, studentName }) {
            const ref = useRef();
            const notesRef = useRef();
            const [name, setName] = useState(studentName ? studentName.replace(/^\d+번\s*/, '') : '');
            const [stage, setStage] = useState('celebrate'); // celebrate → notes → cert
            const [checked, setChecked] = useState({});

            // 이 과정에서 배운 주요 개념 (모두 확인해야 인증서를 받음)
            const concepts = [
                { id: 'c1', emoji: '📦', t: '각기둥은 위·아래에 모양과 크기가 같은 밑면이 2개, 옆면은 모두 직사각형이다.' },
                { id: 'c2', emoji: '🔺', t: '각뿔은 밑면이 1개, 옆면은 모두 삼각형이며 한 꼭짓점에서 모인다.' },
                { id: 'c3', emoji: '🏷️', t: '도형의 이름은 밑면의 모양으로 정해진다. (삼각형 밑면 → 삼각기둥·삼각뿔)' },
                { id: 'c4', emoji: '🔑', t: '밑면의 변의 개수가 늘어나면 옆면의 개수도 똑같이 늘어난다.' },
                { id: 'c5', emoji: '📐', t: '각기둥: 면 = (밑면 변)+2,  꼭짓점 = (밑면 변)×2,  모서리 = (밑면 변)×3' },
                { id: 'c6', emoji: '📐', t: '각뿔: 면 = (밑면 변)+1,  꼭짓점 = (밑면 변)+1,  모서리 = (밑면 변)×2' },
                { id: 'c7', emoji: '✂️', t: '전개도를 접으면 입체도형이 되고, 입체도형을 펼치면 전개도가 된다.' },
            ];
            const checkedCount = concepts.filter(c => checked[c.id]).length;
            const allChecked = checkedCount === concepts.length;
            const toggle = (id) => setChecked(prev => ({ ...prev, [id]: !prev[id] }));

            const downloadCert = () => {
                if (!ref.current) return;
                html2canvas(ref.current, { backgroundColor: "#fef9e7", scale: 2 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `도형마스터_${name || '탐험가'}.jpg`;
                    link.href = canvas.toDataURL();
                    link.click();
                });
            };
            const downloadNote = () => {
                if (!notesRef.current) return;
                html2canvas(notesRef.current, { backgroundColor: "#fffbeb", scale: 2 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `도형개념노트_${name || '탐험가'}.jpg`;
                    link.href = canvas.toDataURL();
                    link.click();
                });
            };

            if (stage === 'celebrate') {
                return (
                    <div className="h-full flex items-center justify-center p-3 paper-bg relative overflow-y-auto">
                        <LocalFireworks />
                        <div className="bg-white ink-border rounded-3xl p-5 stamp-shadow-deep text-center max-w-2xl relative z-10 my-auto">
                            <div className="font-jua text-5xl mb-2">🎉</div>
                            <h1 className="font-jua text-3xl text-amber-900 mb-2 whitespace-nowrap">학습 완료 축하해요!</h1>
                            <div className="font-gaegu text-xl text-amber-800 mb-2 leading-snug">
                                다섯 가지 미션을 모두 풀어 진정한 <b className="text-rose-700">도형 마스터</b>가 되었어요!
                            </div>
                            <p className="text-base text-amber-700 mb-3 leading-snug">
                                각기둥과 각뿔의 비밀, 구성 요소의 규칙, 전개도까지 모두 알아낸 여러분께 박수를 보내요 👏
                            </p>
                            <div className="grid grid-cols-5 gap-2 mb-3">
                                {[
                                    { icon: 'Layers', label: '도형 분류', color: 'bg-amber-400' },
                                    { icon: 'Box', label: '각기둥 탐험', color: 'bg-emerald-500' },
                                    { icon: 'Triangle', label: '각뿔 탐험', color: 'bg-rose-500' },
                                    { icon: 'Sparkles', label: '규칙 발견', color: 'bg-sky-500' },
                                    { icon: 'BoxSelect', label: '전개도 마스터', color: 'bg-violet-500' },
                                ].map(m => (
                                    <div key={m.label} className={`${m.color} ink-border rounded-xl p-1.5 flex flex-col items-center text-white`}>
                                        <Icon name={m.icon} className="w-5 h-5 mb-0.5" />
                                        <div className="text-xs font-jua whitespace-nowrap">{m.label}</div>
                                        <div className="text-[10px]">✓</div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setStage('notes')}
                                className="px-6 py-2 bg-amber-700 text-white rounded-2xl font-jua text-lg hover:bg-amber-800 stamp-shadow inline-flex items-center gap-2 whitespace-nowrap">
                                <Icon name="BookOpen" className="w-5 h-5" /> 배운 내용 정리하기
                            </button>
                        </div>
                    </div>
                );
            }

            // ===== 2단계: 개념 노트 확인 (모두 체크해야 인증서 받기 가능) =====
            if (stage === 'notes') {
                return (
                    <div className="h-full flex flex-col items-center p-3 paper-bg overflow-y-auto">
                        <div className="w-full max-w-2xl my-auto">
                            <div className="text-center mb-2">
                                <h1 className="font-jua text-2xl text-amber-900">📒 도형 개념 노트</h1>
                                <p className="text-sm text-amber-700 leading-snug">배운 핵심 개념을 하나씩 눌러 <b>모두 확인(✓)</b>하면 인증서를 받을 수 있어요!</p>
                            </div>
                            <div ref={notesRef} className="bg-white ink-border rounded-2xl p-4 stamp-shadow">
                                <div className="text-center border-b-2 border-dashed border-amber-300 pb-2 mb-3">
                                    <div className="font-jua text-xl text-amber-900">🏰 도형 왕국 개념 노트</div>
                                    <div className="text-xs text-amber-600 mt-0.5">탐험가: <b>{name || '________'}</b></div>
                                </div>
                                <div className="flex flex-col gap-2">
                                    {concepts.map(c => (
                                        <button key={c.id} type="button" onClick={() => toggle(c.id)}
                                            className={`flex items-start gap-2 text-left p-2 rounded-xl border-2 transition-colors ${checked[c.id] ? 'bg-emerald-50 border-emerald-400' : 'bg-amber-50 border-amber-200 hover:border-amber-400'}`}>
                                            <span className={`shrink-0 w-6 h-6 rounded-md flex items-center justify-center font-bold text-sm ${checked[c.id] ? 'bg-emerald-500 text-white' : 'bg-white border-2 border-amber-300 text-transparent'}`}>✓</span>
                                            <span className="font-gaegu text-base text-amber-900 leading-snug break-keep">{c.emoji} {c.t}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="mt-2 text-center font-jua text-sm">
                                {allChecked
                                    ? <span className="text-emerald-700">✅ 모든 개념을 확인했어요! 이제 인증서를 받으세요.</span>
                                    : <span className="text-amber-700">확인한 개념: {checkedCount} / {concepts.length}</span>}
                            </div>
                            <div className="flex gap-2 justify-center mt-3 flex-wrap">
                                <button onClick={() => setStage('celebrate')}
                                    className="px-4 py-2 bg-white text-amber-800 font-jua text-base rounded-xl ink-border hover:bg-amber-50 stamp-shadow flex items-center gap-1">
                                    <Icon name="ChevronLeft" className="w-4 h-4" /> 뒤로
                                </button>
                                <button onClick={downloadNote}
                                    className="px-4 py-2 bg-sky-600 text-white font-jua text-base rounded-xl hover:bg-sky-700 stamp-shadow flex items-center gap-2">
                                    <Icon name="Download" className="w-4 h-4" /> 개념 노트 다운로드
                                </button>
                                <button onClick={() => setStage('cert')} disabled={!allChecked}
                                    className={`px-5 py-2 font-jua text-base rounded-xl stamp-shadow flex items-center gap-2 ${allChecked ? 'bg-amber-700 text-white hover:bg-amber-800' : 'bg-amber-100 text-amber-400 cursor-not-allowed'}`}>
                                    <Icon name="Award" className="w-4 h-4" /> 인증서 받기
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ===== 3단계: 인증서 =====
            return (
                <div className="h-full flex flex-col items-center justify-center gap-2 p-2 paper-bg overflow-y-auto relative">
                    <LocalFireworks />

                    <div ref={ref} className="bg-amber-50 p-2 rounded-3xl shadow-2xl w-full max-w-xl relative ink-border stamp-shadow-deep">
                        <div className="bg-white p-4 rounded-2xl border-4 border-double border-amber-700 flex flex-col items-center text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-24 h-24 bg-amber-100 rounded-br-full opacity-50 -translate-x-8 -translate-y-8" />
                            <div className="absolute bottom-0 right-0 w-24 h-24 bg-rose-100 rounded-tl-full opacity-50 translate-x-8 translate-y-8" />

                            <div className="mb-2 relative">
                                <Icon name="Award" className="w-14 h-14 text-amber-600" />
                            </div>

                            <div className="mb-3">
                                <h4 className="text-amber-700 font-bold text-[10px] tracking-[0.3em] uppercase">Master Certificate</h4>
                                <h2 className="text-2xl font-jua text-amber-900">🏆 도형 왕국 마스터 인증서 🏆</h2>
                                <p className="font-gaegu text-sm text-amber-700">~ 각기둥과 각뿔의 비밀을 모두 풀어낸 탐험가 ~</p>
                            </div>

                            <div className="mb-3 w-full max-w-sm">
                                <input value={name} onChange={e => setName(e.target.value)}
                                    placeholder="탐험가 이름을 입력하세요"
                                    className="text-xl text-center font-jua text-amber-900 bg-transparent border-b-4 border-amber-500 w-full pb-1 focus:outline-none focus:border-rose-500" />
                                <p className="text-[10px] text-amber-600 font-bold mt-1 tracking-widest">DISCOVERER NAME</p>
                            </div>

                            <p className="text-sm text-amber-800 leading-snug font-gaegu break-keep mb-3 max-w-md">
                                위 탐험가는 사라진 도형 왕국의 일지를 다시 펼쳐
                                <b className="text-rose-700"> 각기둥과 각뿔</b>의 성질·구성 요소,
                                숨겨진 <b className="text-emerald-700">규칙과 전개도</b>의 비밀까지 풀어내었기에
                                이에 <b className="text-amber-900">도형 마스터</b>로 인정합니다.
                            </p>

                            <div className="w-full flex justify-between items-end border-t-2 border-dashed border-amber-300 pt-2">
                                <div className="text-left text-[10px] text-amber-700">
                                    <p className="font-bold uppercase tracking-widest">Date</p>
                                    <p className="text-xs font-bold">{new Date().toLocaleDateString('ko-KR')}</p>
                                </div>
                                <div className="w-12 h-12 bg-rose-100 rounded-full border-4 border-rose-400 flex items-center justify-center -rotate-12">
                                    <span className="text-[8px] font-jua text-rose-700 leading-tight text-center">탐험대장<br/>직인</span>
                                </div>
                                <div className="text-right text-[10px] text-amber-700">
                                    <p className="font-bold uppercase tracking-widest">From</p>
                                    <p className="text-xs font-bold">도형 왕국</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="flex gap-2 z-10 shrink-0">
                        <button onClick={downloadCert} className="px-4 py-2 bg-amber-700 text-white font-jua text-base flex gap-2 rounded-xl hover:bg-amber-800 stamp-shadow items-center">
                            <Icon name="Download" className="w-4 h-4" /> 수료증 저장
                        </button>
                        <button onClick={onReset} className="px-4 py-2 bg-white text-amber-800 font-jua text-base rounded-xl ink-border hover:bg-amber-50 stamp-shadow">
                            처음으로
                        </button>
                    </div>
                </div>
            );
        }

        // ============================================================
        //                       MAIN APP
        // ============================================================
        function App() {
            const [step, setStep] = useState('student'); // 시작: 학생 이름 선택
            const [studentName, setStudentName] = useState('');
            const [completed, setCompleted] = useState({ classify: false, prism: false, pyramid: false, pattern: false, net: false });

            const MISSION_ORDER = ['classify', 'prism', 'pyramid', 'pattern', 'net'];

            const completeMission = (id) => {
                // 스프레드시트 '학습기록' 시트에 미션 완료를 기록합니다. (연결되어 있을 때만 동작)
                if (ShapeAPI.isConnected() && studentName) {
                    ShapeAPI.recordMission(studentName, id).catch(function () { /* 기록 실패해도 진행은 계속 */ });
                }
                const newCompleted = { ...completed, [id]: true };
                setCompleted(newCompleted);
                const allDone = MISSION_ORDER.every(k => newCompleted[k]);
                if (allDone) {
                    // 모든 미션 완료 → 수료증 화면으로 이동
                    setStep('cert');
                } else {
                    // 다음 미션으로 자동 이동
                    const idx = MISSION_ORDER.indexOf(id);
                    const next = MISSION_ORDER[idx + 1];
                    if (next) setStep(next);
                    else setStep('home');
                }
            };

            const renderContent = () => {
                let content;
                switch (step) {
                    case 'student': content = <StudentSelectView onEnter={(name) => { setStudentName(name); setStep('home'); }} />; break;
                    case 'home': content = <HomeView setStep={setStep} completed={completed} studentName={studentName} />; break;
                    case 'classify': content = <ClassifyView key="classify" studentName={studentName} onComplete={() => completeMission('classify')} onBack={() => setStep('home')} />; break;
                    case 'prism': content = <ShapeExploreView key="prism" kind="prism" studentName={studentName} onComplete={() => completeMission('prism')} onBack={() => setStep('home')} />; break;
                    case 'pyramid': content = <ShapeExploreView key="pyramid" kind="pyramid" studentName={studentName} onComplete={() => completeMission('pyramid')} onBack={() => setStep('home')} />; break;
                    case 'pattern': content = <PatternView key="pattern" studentName={studentName} onComplete={() => completeMission('pattern')} onBack={() => setStep('home')} />; break;
                    case 'net': content = <NetView key="net" studentName={studentName} onComplete={() => completeMission('net')} onBack={() => setStep('home')} />; break;
                    case 'cert': content = <CertView studentName={studentName} onReset={() => { setStep('home'); setCompleted({ classify: false, prism: false, pyramid: false, pattern: false, net: false }); }} />; break;
                    default: content = <HomeView setStep={setStep} completed={completed} studentName={studentName} />;
                }
                return <ErrorBoundary resetKey={step}>{content}</ErrorBoundary>;
            };

            const tabs = [
                { id: 'home', label: '왕국', icon: 'Map', color: 'bg-amber-500' },
                { id: 'classify', label: '분류', icon: 'Layers', color: 'bg-amber-400' },
                { id: 'prism', label: '각기둥', icon: 'Box', color: 'bg-emerald-500' },
                { id: 'pyramid', label: '각뿔', icon: 'Triangle', color: 'bg-rose-500' },
                { id: 'pattern', label: '규칙', icon: 'Sparkles', color: 'bg-sky-500' },
                { id: 'net', label: '전개도', icon: 'BoxSelect', color: 'bg-violet-500' },
                { id: 'cert', label: '인증', icon: 'Award', color: 'bg-yellow-500' },
            ];

            const showMainHeader = step === 'home';

            return (
                <div className="h-[100dvh] w-full overflow-hidden flex items-stretch relative" style={{ background: 'linear-gradient(135deg, #fef3c7 0%, #fed7aa 50%, #fecaca 100%)' }}>
                    <div className="relative w-full h-[100dvh] flex flex-row items-stretch p-2 pr-[170px]">
                        <div className="flex-1 bg-white/95 backdrop-blur-md ink-border rounded-3xl stamp-shadow-deep z-20 flex flex-col overflow-hidden relative">
                            {showMainHeader && (
                                <div className="flex items-center justify-between px-3 py-2 shrink-0 border-b-2 border-amber-200 bg-amber-50/60 z-30">
                                    <div className="flex items-center gap-2 min-w-0">
                                        <div className="w-9 h-9 bg-amber-700 rounded-lg flex items-center justify-center stamp-shadow ink-border rotate-[-3deg] shrink-0">
                                            <Icon name="BookOpen" className="text-amber-100 w-5 h-5" />
                                        </div>
                                        <h1 className="font-jua text-xl text-amber-900 whitespace-nowrap">도형 왕국의 잃어버린 일지</h1>
                                        <span className="text-sm text-amber-700 font-bold whitespace-nowrap">· 각기둥과 각뿔 · 6학년</span>
                                    </div>

                                    <div className="flex items-center gap-2 shrink-0">
                                        <div className="px-3 py-1 bg-rose-100 border-2 border-rose-300 rounded-full text-sm font-bold text-rose-700 flex items-center gap-1">
                                            <Icon name="Stamp" className="w-4 h-4" />
                                            {Object.values(completed).filter(Boolean).length}/5
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="flex-1 overflow-hidden relative z-10">
                                {renderContent()}
                            </div>
                        </div>

                        {/* 사이드 탭 - 학생 선택 화면에서는 숨김 */}
                        {step !== 'student' && (
                            <div className="absolute top-[70px] right-2 z-10">
                                <div className="flex flex-col gap-2">
                                    {tabs.map(tab => {
                                        const active = step === tab.id;
                                        const isDone = completed[tab.id];
                                        return (
                                            <button key={tab.id} onClick={() => setStep(tab.id)}
                                                className={`group relative flex items-center gap-2.5 w-[160px] h-14 rounded-xl ink-border stamp-shadow transition-all px-3 ${active ? `${tab.color} text-white scale-105` : `${tab.color} text-white opacity-75 hover:opacity-100`}`}>
                                                <Icon name={tab.icon} className="shrink-0 w-5 h-5" />
                                                <span className="font-jua text-lg whitespace-nowrap leading-none">{tab.label}</span>
                                                {isDone && (
                                                    <div className="absolute -top-2 -right-2 w-7 h-7 bg-emerald-500 rounded-full border-2 border-white text-sm flex items-center justify-center text-white font-bold stamp-shadow">✓</div>
                                                )}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
