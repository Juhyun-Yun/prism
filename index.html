<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도형 왕국의 수수께끼 - 각기둥과 각뿔의 비밀</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&family=Single+Day&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

        /* 학교안심 칠판지우개체 (KCC/노눈에서 배포한 무료 폰트) */
        @font-face {
            font-family: 'HakgyoansimChalk';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2206-02@1.0/HakgyoansimChilpanjiugeTTF-R.woff') format('woff');
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: 'HakgyoansimChalk';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2206-02@1.0/HakgyoansimChilpanjiugeTTF-B.woff') format('woff');
            font-weight: 700;
            font-display: swap;
        }

        html { font-size: 22px; height: 100%; }

        body {
            font-family: 'HakgyoansimChalk', 'Gowun Dodum', 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #fef3c7 0%, #fed7aa 50%, #fecaca 100%);
            color: #1e293b;
            /* 한글 단어 단위 줄바꿈 - 단어 중간 끊김 방지 */
            word-break: keep-all;
            overflow-wrap: break-word;
            line-break: strict;
        }

        /* 모든 한글 텍스트 단어 단위 줄바꿈 + 폰트 통일 */
        p, h1, h2, h3, h4, h5, h6, span, div, button, label, td, th, li, a, input, textarea {
            font-family: 'HakgyoansimChalk', 'Gowun Dodum', 'Noto Sans KR', sans-serif;
            word-break: keep-all;
            line-break: strict;
        }

        /* 제목 전용 - 진짜 주아체 */
        .font-jua {
            font-family: 'Jua', 'HakgyoansimChalk', 'Gowun Dodum', 'Noto Sans KR', sans-serif !important;
            font-weight: 400;
            letter-spacing: -0.01em;
        }
        .font-gaegu {
            font-family: 'HakgyoansimChalk', 'Single Day', 'Gowun Dodum', sans-serif !important;
            font-weight: 400;
        }
        /* 대화(font-gaegu) 안의 span/p/b 등이 전역 span 규칙 때문에 다른 글씨체로 빠지지 않도록
           항상 부모(대화) 글씨체를 따라가게 함 - 경비 아저씨처럼 span으로 감싼 대화도 동일하게 보임 */
        .font-gaegu span, .font-gaegu p, .font-gaegu b, .font-gaegu strong, .font-gaegu em, .font-gaegu div {
            font-family: inherit !important;
        }

        /* 스크롤바 완전히 숨김 */
        ::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none; }
        * { scrollbar-width: none; -ms-overflow-style: none; }

        .font-jua { font-family: 'Jua', sans-serif; }
        .font-gaegu { font-family: 'Gaegu', cursive; font-weight: 700; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }

        .paper-bg {
            background-color: #fef9e7;
            background-image:
                linear-gradient(90deg, rgba(180, 140, 80, 0.05) 1px, transparent 1px),
                linear-gradient(rgba(180, 140, 80, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .map-bg {
            background-color: #fef3c7;
            background-image: radial-gradient(circle at 20% 30%, rgba(217, 119, 6, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(190, 18, 60, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 90%, rgba(5, 150, 105, 0.06) 0%, transparent 40%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .stamp-shadow {
            box-shadow: 4px 4px 0px 0px rgba(120, 53, 15, 0.3);
        }

        .stamp-shadow-deep {
            box-shadow: 6px 6px 0px 0px rgba(120, 53, 15, 0.4);
        }

        .ink-border {
            border: 3px solid #78350f;
        }

        .ink-border-dashed {
            border: 3px dashed #78350f;
        }

        /* 핵심 단어 형광펜 하이라이트 (글씨체는 주변 텍스트를 그대로 따라감) */
        .hl-key {
            font-family: inherit;
            background: linear-gradient(transparent 52%, #fde047 52%);
            padding: 0 2px;
            font-weight: 700;
            border-radius: 2px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .floating { animation: float 3s ease-in-out infinite; }

        @keyframes stamp-in {
            0% { transform: scale(3) rotate(-30deg); opacity: 0; }
            60% { transform: scale(0.9) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(-12deg); opacity: 0.85; }
        }

        .stamp-in { animation: stamp-in 0.6s ease-out forwards; }

        /* 부분 버튼을 누르면: 가운데에서 크게 떠서 충분히 읽을 시간을 준 뒤, 오른쪽 위(마을 어른 말주머니 쪽)로 날아가며 사라짐 */
        @keyframes pop-then-park {
            0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
            8%   { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
            14%  { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            80%  { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(120%, -85%) scale(0.3); opacity: 0; }
        }
        .pop-then-park { animation: pop-then-park 3.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .shake { animation: shake 0.4s ease-in-out; }

        .draggable-card {
            cursor: grab;
            user-select: none;
            touch-action: none;
        }

        .draggable-card:active { cursor: grabbing; }

        .drop-zone-active {
            background: rgba(251, 191, 36, 0.15) !important;
            border-color: #d97706 !important;
            transform: scale(1.02);
        }

        * { transition: background-color 0.2s, border-color 0.2s, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s; }
    </style>
</head>

<body>
    <div id="root"></div>

    <script src="script.compiled.js"></script>
</body>

</html>
