<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도형 왕국의 잃어버린 일지 - 각기둥과 각뿔</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&family=Single+Day&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

        /* 학교안심 칠판지우개체 (KCC/노눈에서 배포한 무료 폰트) */
        @font-face {
            font-family: 'HakgyoansimChalk';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2206-02@1.0/HakgyoansimChilpanjiugeTTF-R.woff') format('woff');
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: 'HakgyoansimChalk';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2206-02@1.0/HakgyoansimChilpanjiugeTTF-B.woff') format('woff');
            font-weight: 700;
            font-display: swap;
        }

        html { font-size: 22px; height: 100%; }

        body {
            font-family: 'HakgyoansimChalk', 'Gowun Dodum', 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #fef3c7 0%, #fed7aa 50%, #fecaca 100%);
            color: #1e293b;
            /* 한글 단어 단위 줄바꿈 - 단어 중간 끊김 방지 */
            word-break: keep-all;
            overflow-wrap: break-word;
            line-break: strict;
        }

        /* 모든 한글 텍스트 단어 단위 줄바꿈 + 폰트 통일 */
        p, h1, h2, h3, h4, h5, h6, span, div, button, label, td, th, li, a, input, textarea {
            font-family: 'HakgyoansimChalk', 'Gowun Dodum', 'Noto Sans KR', sans-serif;
            word-break: keep-all;
            line-break: strict;
        }

        /* 제목 전용 - 진짜 주아체 */
        .font-jua {
            font-family: 'Jua', 'HakgyoansimChalk', 'Gowun Dodum', 'Noto Sans KR', sans-serif !important;
            font-weight: 400;
            letter-spacing: -0.01em;
        }
        .font-gaegu {
            font-family: 'HakgyoansimChalk', 'Single Day', 'Gowun Dodum', sans-serif !important;
            font-weight: 400;
        }
        /* 대화(font-gaegu) 안의 span/p/b 등이 전역 span 규칙 때문에 다른 글씨체로 빠지지 않도록
           항상 부모(대화) 글씨체를 따라가게 함 - 경비 아저씨처럼 span으로 감싼 대화도 동일하게 보임 */
        .font-gaegu span, .font-gaegu p, .font-gaegu b, .font-gaegu strong, .font-gaegu em, .font-gaegu div {
            font-family: inherit !important;
        }

        /* 스크롤바 완전히 숨김 */
        ::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none; }
        * { scrollbar-width: none; -ms-overflow-style: none; }

        .font-jua { font-family: 'Jua', sans-serif; }
        .font-gaegu { font-family: 'Gaegu', cursive; font-weight: 700; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }

        .paper-bg {
            background-color: #fef9e7;
            background-image:
                linear-gradient(90deg, rgba(180, 140, 80, 0.05) 1px, transparent 1px),
                linear-gradient(rgba(180, 140, 80, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .map-bg {
            background-color: #fef3c7;
            background-image: radial-gradient(circle at 20% 30%, rgba(217, 119, 6, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(190, 18, 60, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 90%, rgba(5, 150, 105, 0.06) 0%, transparent 40%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .stamp-shadow {
            box-shadow: 4px 4px 0px 0px rgba(120, 53, 15, 0.3);
        }

        .stamp-shadow-deep {
            box-shadow: 6px 6px 0px 0px rgba(120, 53, 15, 0.4);
        }

        .ink-border {
            border: 3px solid #78350f;
        }

        .ink-border-dashed {
            border: 3px dashed #78350f;
        }

        /* 핵심 단어 형광펜 하이라이트 (글씨체는 주변 텍스트를 그대로 따라감) */
        .hl-key {
            font-family: inherit;
            background: linear-gradient(transparent 52%, #fde047 52%);
            padding: 0 2px;
            font-weight: 700;
            border-radius: 2px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .floating { animation: float 3s ease-in-out infinite; }

        @keyframes stamp-in {
            0% { transform: scale(3) rotate(-30deg); opacity: 0; }
            60% { transform: scale(0.9) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(-12deg); opacity: 0.85; }
        }

        .stamp-in { animation: stamp-in 0.6s ease-out forwards; }

        /* 부분 버튼을 누르면: 가운데에서 크게 떠서 충분히 읽을 시간을 준 뒤, 오른쪽 위(마을 어른 말주머니 쪽)로 날아가며 사라짐 */
        @keyframes pop-then-park {
            0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
            8%   { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
            14%  { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            80%  { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(120%, -85%) scale(0.3); opacity: 0; }
        }
        .pop-then-park { animation: pop-then-park 3.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .shake { animation: shake 0.4s ease-in-out; }

        .draggable-card {
            cursor: grab;
            user-select: none;
            touch-action: none;
        }

        .draggable-card:active { cursor: grabbing; }

        .drop-zone-active {
            background: rgba(251, 191, 36, 0.15) !important;
            border-color: #d97706 !important;
            transform: scale(1.02);
        }

        * { transition: background-color 0.2s, border-color 0.2s, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s; }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, Fragment, useCallback } = React;

        // ============ ERROR BOUNDARY (빈 화면 방지 - 에러를 잡아 메시지 표시) ============
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, errorMsg: '' };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, errorMsg: (error && error.message) ? error.message : String(error) };
            }
            componentDidCatch(error, info) {
                console.error('ErrorBoundary caught:', error, info);
            }
            componentDidUpdate(prevProps) {
                // 자식이 바뀌면 (예: step 변경) 에러 상태 리셋
                if (this.state.hasError && prevProps.resetKey !== this.props.resetKey) {
                    this.setState({ hasError: false, errorMsg: '' });
                }
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="h-full flex items-center justify-center p-6 paper-bg">
                            <div className="bg-white ink-border rounded-2xl p-6 max-w-xl stamp-shadow">
                                <div className="text-5xl mb-2 text-center">⚠</div>
                                <h2 className="font-jua text-xl text-amber-900 mb-2 text-center">앗, 화면을 그리다 문제가 생겼어요</h2>
                                <div className="bg-amber-50 p-3 rounded-lg border-2 border-amber-300 mb-3">
                                    <p className="text-sm text-amber-800 font-mono break-all whitespace-pre-wrap">{this.state.errorMsg}</p>
                                </div>
                                <button onClick={() => this.setState({ hasError: false, errorMsg: '' })}
                                    className="w-full px-4 py-2 bg-amber-700 text-white rounded-lg font-jua hover:bg-amber-800">
                                    다시 시도
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // ============ ICON WRAPPER ============
        // lucide.createIcons가 span을 SVG로 교체하는 동작이 React와 충돌하므로
        // 임시 컨테이너에서 SVG를 생성한 후 dangerouslySetInnerHTML로 안전하게 삽입
        const iconCache = {};
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const [svgHtml, setSvgHtml] = useState(() => iconCache[name + '|' + className] || '');
            useEffect(() => {
                const cacheKey = name + '|' + className;
                if (iconCache[cacheKey]) { setSvgHtml(iconCache[cacheKey]); return; }
                try {
                    if (typeof lucide === 'undefined' || !lucide.icons || !lucide.icons[name]) {
                        setSvgHtml('');
                        return;
                    }
                    // 임시 컨테이너에 span 만들고 lucide로 SVG 생성 후 추출
                    const temp = document.createElement('div');
                    temp.style.position = 'absolute';
                    temp.style.left = '-9999px';
                    const span = document.createElement('span');
                    span.setAttribute('data-lucide', name);
                    temp.appendChild(span);
                    document.body.appendChild(temp);
                    try {
                        lucide.createIcons({
                            icons: { [name]: lucide.icons[name] },
                            attrs: { class: className },
                            nameAttr: 'data-lucide'
                        });
                        const svg = temp.querySelector('svg');
                        if (svg) {
                            svg.setAttribute('class', className);
                            const html = svg.outerHTML;
                            iconCache[cacheKey] = html;
                            setSvgHtml(html);
                        }
                    } finally {
                        try { document.body.removeChild(temp); } catch (e) {}
                    }
                } catch (e) {
                    console.warn('Lucide icon render skipped:', name, e);
                }
            }, [name, className]);
            return <span className={className} dangerouslySetInnerHTML={{__html: svgHtml}} />;
        };

        // ============ AVATAR GUIDE COMPONENT ============
        // side='left'(기본): 아바타 왼쪽 + 말풍선 오른쪽 / side='right': 아바타 오른쪽 끝 + 말풍선 왼쪽
        const AvatarGuide = ({ char = 'elder', text, side = 'left' }) => {
            const avatars = {
                elder: { name: '👴 마을 어른', img: 'assets/elder.png', border: 'border-amber-600', textBg: 'bg-amber-50/90 border-amber-300', arrowColor: '#fffbeb' },
                granny: { name: '👵 사서 할머니', img: 'assets/granny.png', border: 'border-sky-600', textBg: 'bg-sky-50/90 border-sky-300', arrowColor: '#f0f9ff' },
                master: { name: '🛠️ 공방장', img: 'assets/master.png', border: 'border-violet-600', textBg: 'bg-violet-50/90 border-violet-300', arrowColor: '#f5f3ff' },
                guard: { name: '👮 경비 아저씨', img: 'assets/guard.png', border: 'border-slate-600', textBg: 'bg-slate-50/90 border-slate-300', arrowColor: '#f8fafc' }
            };

            const info = avatars[char] || avatars.elder;
            const isRight = side === 'right';

            return (
                <div className={`flex gap-2 items-center shrink-0 mb-1 w-full ${isRight ? 'flex-row-reverse' : ''}`}>
                    {/* 아바타 (이름표 제거 - 자리 절약) */}
                    <div className={`w-14 h-14 rounded-full overflow-hidden ink-border ${info.border} stamp-shadow bg-white shrink-0`} title={info.name}>
                        <img src={info.img} className="w-full h-full object-cover" alt={info.name} />
                    </div>

                    {/* 말주머니 (Speech Bubble) - 아바타를 향해 화살표가 가리킴 */}
                    <div className={`flex-1 relative px-3 py-2 rounded-2xl ink-border ${info.textBg} stamp-shadow`}>
                        {isRight ? (
                            <>
                                {/* 오른쪽(아바타 방향) 화살표 */}
                                <div className="absolute top-1/2 -translate-y-1/2 -right-[11px] w-0 h-0 border-t-[8px] border-t-transparent border-l-[11px] border-l-[#78350f] border-b-[8px] border-b-transparent"></div>
                                <div className="absolute top-1/2 -translate-y-1/2 -right-2 w-0 h-0 border-t-[7px] border-t-transparent border-b-[7px] border-b-transparent z-10"
                                     style={{ borderLeft: `9px solid ${info.arrowColor}` }}></div>
                            </>
                        ) : (
                            <>
                                {/* 왼쪽(아바타 방향) 화살표 */}
                                <div className="absolute top-1/2 -translate-y-1/2 -left-[11px] w-0 h-0 border-t-[8px] border-t-transparent border-r-[11px] border-r-[#78350f] border-b-[8px] border-b-transparent"></div>
                                <div className="absolute top-1/2 -translate-y-1/2 -left-2 w-0 h-0 border-t-[7px] border-t-transparent border-b-[7px] border-b-transparent z-10"
                                     style={{ borderRight: `9px solid ${info.arrowColor}` }}></div>
                            </>
                        )}

                        <div className="text-amber-900 leading-snug font-gaegu text-lg">
                            {text}
                        </div>
                    </div>
                </div>
            );
        };

        // ============ DATA ============
        const PRISMS = [
            { id: 'tri_p', name: '삼각기둥', type: 'prism', n: 3, baseName: '삼각형', faces: 5, vertices: 6, edges: 9 },
            { id: 'sqr_p', name: '사각기둥', type: 'prism', n: 4, baseName: '사각형', faces: 6, vertices: 8, edges: 12 },
            { id: 'pen_p', name: '오각기둥', type: 'prism', n: 5, baseName: '오각형', faces: 7, vertices: 10, edges: 15 },
            { id: 'hex_p', name: '육각기둥', type: 'prism', n: 6, baseName: '육각형', faces: 8, vertices: 12, edges: 18 },
        ];

        const PYRAMIDS = [
            { id: 'tri_y', name: '삼각뿔', type: 'pyramid', n: 3, baseName: '삼각형', faces: 4, vertices: 4, edges: 6 },
            { id: 'sqr_y', name: '사각뿔', type: 'pyramid', n: 4, baseName: '사각형', faces: 5, vertices: 5, edges: 8 },
            { id: 'pen_y', name: '오각뿔', type: 'pyramid', n: 5, baseName: '오각형', faces: 6, vertices: 6, edges: 10 },
            { id: 'hex_y', name: '육각뿔', type: 'pyramid', n: 6, baseName: '육각형', faces: 7, vertices: 7, edges: 12 },
        ];

        // ============ 학생 명단 (연결 전 체험용 더미) ============
        // 스프레드시트에 연결되지 않은 "체험 모드"에서만 보이는 예시 명단입니다.
        // 실제 명단은 각 선생님의 스프레드시트 '학생명단' 시트에서 불러옵니다.
        const STUDENT_LIST = [
            '1번 김도형', '2번 박탐험', '3번 이마을', '4번 정각기둥',
            '5번 최각뿔', '6번 강전개도', '7번 윤마법사', '8번 임공방',
            '9번 한꼭짓점', '10번 서모서리', '11번 권밑면', '12번 차옆면',
            '13번 노다각형', '14번 송삼각', '15번 안사각', '16번 천오각',
            '17번 백육각', '18번 황비밀', '19번 신탐사', '20번 도탐구'
        ];

        // ============ 스프레드시트 연결 (GitHub 배포용 · JSONP) ============
        // 앱은 GitHub 주소로 배포되고, 각 선생님은 자신의 스프레드시트 사본에 연결된
        // 앱스스크립트 "웹 앱 URL"을 앱에 등록해 사용합니다.
        // 학생용 공유 링크 예) https://myname.github.io/shapes/?api=https://script.google.com/macros/s/AKxxxx/exec
        //  - ?api= 주소가 있으면 그 주소를 저장하고 사용합니다(학생이 링크만 눌러도 자동 연결).
        //  - 명단은 스프레드시트 '학생명단' 시트에서 읽어와 드롭다운으로 보여줍니다(getStudentList).
        //  - 일반 fetch는 출처(origin)가 달라 CORS에 막히므로 JSONP(GET+callback)로 통신합니다.
        const ShapeAPI = (function () {
            function readApiUrl() {
                try {
                    var fromQuery = new URLSearchParams(location.search).get('api');
                    if (fromQuery) { localStorage.setItem('shapeApiUrl', fromQuery); return fromQuery; }
                    return localStorage.getItem('shapeApiUrl') || '';
                } catch (e) { return ''; }
            }
            var apiUrl = readApiUrl();

            function call(action, params) {
                return new Promise(function (resolve, reject) {
                    if (!apiUrl) { reject(new Error('연결된 스프레드시트가 없습니다.')); return; }
                    var cb = 'shapeCb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
                    var script = document.createElement('script');
                    var timer = setTimeout(function () { cleanup(); reject(new Error('시간 초과')); }, 12000);
                    function cleanup() {
                        clearTimeout(timer);
                        try { delete window[cb]; } catch (e) { window[cb] = undefined; }
                        if (script.parentNode) script.parentNode.removeChild(script);
                    }
                    window[cb] = function (data) { cleanup(); resolve(data); };
                    var qs = Object.keys(params || {}).map(function (k) {
                        return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
                    });
                    qs.unshift('action=' + encodeURIComponent(action));
                    qs.push('callback=' + cb);
                    script.src = apiUrl + (apiUrl.indexOf('?') >= 0 ? '&' : '?') + qs.join('&');
                    script.onerror = function () { cleanup(); reject(new Error('네트워크 오류')); };
                    document.body.appendChild(script);
                });
            }

            return {
                isConnected: function () { return !!apiUrl; },
                getApiUrl: function () { return apiUrl; },
                setApiUrl: function (url) {
                    apiUrl = (url || '').trim();
                    try {
                        if (apiUrl) localStorage.setItem('shapeApiUrl', apiUrl);
                        else localStorage.removeItem('shapeApiUrl');
                    } catch (e) {}
                },
                // '학생명단' 시트에서 명단을 읽어옵니다 (드롭다운 채우기용)
                getStudentList: function () {
                    return call('list', {}).then(function (d) { return (d && d.students) || []; });
                },
                recordMission: function (name, mission) {
                    return call('record', { name: name, mission: mission });
                }
            };
        })();

        // 분류 활동용 - 각기둥과 각뿔만 (원기둥, 원뿔은 2학기 과정)
        const CLASSIFY_ITEMS = [
            { id: 'c1', name: '삼각기둥', kind: 'prism', shape: PRISMS[0], color: 0xf59e0b },
            { id: 'c2', name: '삼각뿔', kind: 'pyramid', shape: PYRAMIDS[0], color: 0xec4899 },
            { id: 'c3', name: '사각기둥', kind: 'prism', shape: PRISMS[1], color: 0x10b981 },
            { id: 'c4', name: '사각뿔', kind: 'pyramid', shape: PYRAMIDS[1], color: 0xef4444 },
            { id: 'c5', name: '오각기둥', kind: 'prism', shape: PRISMS[2], color: 0x0ea5e9 },
            { id: 'c6', name: '오각뿔', kind: 'pyramid', shape: PYRAMIDS[2], color: 0x8b5cf6 },
        ];

        const onlyKorean = (val) => val.replace(/[^ㄱ-ㅎㅏ-ㅣ가-힣0-9\s]/g, '').trim();

        // n각형(밑면) BufferGeometry - Three.js CylinderGeometry/ConeGeometry는 x=sin*r, z=cos*r 순서
        const createNgonGeometry = (radius, n) => {
            const geometry = new THREE.BufferGeometry();
            const vertices = [0, 0, 0]; // 중심점
            const indices = [];
            for (let i = 0; i < n; i++) {
                const a = (i / n) * Math.PI * 2;
                vertices.push(Math.sin(a) * radius, 0, Math.cos(a) * radius);
            }
            for (let i = 0; i < n; i++) {
                indices.push(0, i + 1, ((i + 1) % n) + 1);
            }
            geometry.setIndex(indices);
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.computeVertexNormals();
            return geometry;
        };

        // 접기 애니메이션용 n각형: 한 변이 X축 (-sideLen/2 ~ +sideLen/2)에 있고 polygon이 +Y 방향으로 연장
        const createNgonForHinge = (radius, n) => {
            const apothem = radius * Math.cos(Math.PI / n);
            const geometry = new THREE.BufferGeometry();
            const vertices = [0, apothem, 0]; // 중심 (Y+ 방향 apothem 거리)
            const indices = [];
            const a0 = -Math.PI / 2 - Math.PI / n;
            for (let i = 0; i < n; i++) {
                const a = a0 + i * (2 * Math.PI / n);
                vertices.push(radius * Math.cos(a), apothem + radius * Math.sin(a), 0);
            }
            for (let i = 0; i < n; i++) {
                indices.push(0, i + 1, ((i + 1) % n) + 1);
            }
            geometry.setIndex(indices);
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.computeVertexNormals();
            return geometry;
        };

        // 색상 어둡게 (옆면 강조용)
        const darkenColor = (hex, factor = 0.55) => {
            const r = ((hex >> 16) & 0xff) * factor;
            const g = ((hex >> 8) & 0xff) * factor;
            const b = (hex & 0xff) * factor;
            return (Math.round(r) << 16) | (Math.round(g) << 8) | Math.round(b);
        };
        // 색상 밝게 (메인 mesh 색용 - 옅은 파스텔)
        const lightenColor = (hex, factor = 0.75) => {
            const r = (hex >> 16) & 0xff;
            const g = (hex >> 8) & 0xff;
            const b = hex & 0xff;
            const nr = Math.round(r + (255 - r) * factor);
            const ng = Math.round(g + (255 - g) * factor);
            const nb = Math.round(b + (255 - b) * factor);
            return (nr << 16) | (ng << 8) | nb;
        };

        // ============ 3D VIEWER (겨냥도 스타일) ============
        // 보이는 모서리: 검은 실선 / 가려진 모서리: 검은 점선 / 면: 옅은 fill
        // highlight: 'base'|'side'|'vertex'|'edge'|'none'
        function Shape3DViewer({ shape, color = 0xf59e0b, highlight = 'none', special = null, interactive = false, onPartClick = null }) {
            const mountRef = useRef(null);
            const stateRef = useRef({});
            const cbRef = useRef(onPartClick);
            cbRef.current = onPartClick;  // 최신 콜백 유지 (재초기화 방지)

            useEffect(() => {
                let renderer, scene, camera, group, frameId, ro;
                let isMounted = true;
                let initialized = false;
                let geo = null, mat = null;
                const disposables = [];

                const initThree = (w, h) => {
                    if (initialized || !mountRef.current) return;
                    // 기존 canvas만 안전하게 제거 (React 관리 children은 절대 건드리지 않음)
                    const oldCanvases = mountRef.current.querySelectorAll('canvas');
                    oldCanvases.forEach(c => {
                        try { if (c.parentNode === mountRef.current) mountRef.current.removeChild(c); } catch (e) {}
                    });
                    scene = new THREE.Scene();
                    scene.background = null;
                    camera = new THREE.PerspectiveCamera(38, w / h, 0.1, 1000);
                    camera.position.set(0, 1.4, 5.5);
                    camera.lookAt(0, 0, 0);

                    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                    renderer.setPixelRatio(window.devicePixelRatio);
                    renderer.setSize(w, h);
                    mountRef.current.appendChild(renderer.domElement);

                    scene.add(new THREE.AmbientLight(0xffffff, 0.95));

                    group = new THREE.Group();
                    scene.add(group);

                    const r = 1.3, ht = 2.4;
                    if (special === 'cylinder') {
                        geo = new THREE.CylinderGeometry(r, r, ht, 32);
                    } else if (special === 'cone') {
                        geo = new THREE.ConeGeometry(r, ht, 32);
                    } else if (shape.type === 'prism') {
                        geo = new THREE.CylinderGeometry(r, r, ht, shape.n);
                    } else if (shape.type === 'pyramid') {
                        geo = new THREE.ConeGeometry(r, ht, shape.n);
                    }
                    disposables.push(geo);

                    // ============ 진짜 겨냥도 렌더링 ============
                    // 흐름: mesh 그림 → 점선 그림(모든 모서리) → 실선 그림(보이는 모서리만)
                    // - mesh는 불투명이라 depth 정확히 작성됨
                    // - 점선은 depthTest off로 mesh 위에 모든 모서리 그려짐
                    // - 실선은 depthTest on + polygonOffset으로 mesh보다 살짝 앞 → 보이는 부분만 그려져 점선 위 덮음
                    // - 가려진 부분: 점선만 남음
                    const meshColor = lightenColor(color, 0.78);
                    mat = new THREE.MeshBasicMaterial({
                        color: meshColor,
                        side: THREE.DoubleSide,
                        polygonOffset: true,
                        polygonOffsetFactor: 1.0,
                        polygonOffsetUnits: 1.0
                    });
                    disposables.push(mat);
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.renderOrder = 0;
                    group.add(mesh);

                    const edges = new THREE.EdgesGeometry(geo);
                    disposables.push(edges);

                    // 점선 (가려진 모서리용) - depthTest off라 mesh 위에 항상 그려짐, renderOrder로 mesh 다음
                    const dashedMat = new THREE.LineDashedMaterial({
                        color: 0x1e293b,
                        dashSize: 0.11,
                        gapSize: 0.07,
                        depthTest: false,
                        depthWrite: false
                    });
                    disposables.push(dashedMat);
                    const dashedLines = new THREE.LineSegments(edges, dashedMat);
                    dashedLines.computeLineDistances();
                    dashedLines.renderOrder = 1;
                    group.add(dashedLines);

                    // 실선 (보이는 모서리용) - depthTest on, mesh가 polygonOffset으로 뒤로 가서 line이 앞에
                    const solidMat = new THREE.LineBasicMaterial({
                        color: 0x0f172a,
                        linewidth: 2
                    });
                    disposables.push(solidMat);
                    const solidLines = new THREE.LineSegments(edges, solidMat);
                    solidLines.renderOrder = 2;
                    group.add(solidLines);

                    // ============ 하이라이트 처리 ============

                    // 옆면 강조 - 메인 색의 진한 버전 (각기둥=초록, 각뿔=분홍 계열 유지)
                    if (highlight === 'side' && !special && !interactive) {
                        const sideColor = darkenColor(color, 0.55);
                        const sideMat = new THREE.MeshBasicMaterial({
                            color: sideColor,
                            side: THREE.DoubleSide,
                            transparent: true,
                            opacity: 0.85,
                            polygonOffset: true,
                            polygonOffsetFactor: -1,
                            polygonOffsetUnits: -1
                        });
                        disposables.push(sideMat);
                        if (shape.type === 'prism') {
                            // 각 옆면(직사각형)을 별도 mesh로
                            for (let i = 0; i < shape.n; i++) {
                                const a1 = (i / shape.n) * Math.PI * 2;
                                const a2 = ((i + 1) / shape.n) * Math.PI * 2;
                                const x1 = Math.sin(a1) * r, z1 = Math.cos(a1) * r;
                                const x2 = Math.sin(a2) * r, z2 = Math.cos(a2) * r;
                                const sGeo = new THREE.BufferGeometry();
                                const verts = new Float32Array([
                                    x1, ht/2, z1,  x2, ht/2, z2,
                                    x2, -ht/2, z2, x1, -ht/2, z1
                                ]);
                                sGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
                                sGeo.setIndex([0, 1, 2, 0, 2, 3]);
                                sGeo.computeVertexNormals();
                                disposables.push(sGeo);
                                group.add(new THREE.Mesh(sGeo, sideMat));
                            }
                        } else if (shape.type === 'pyramid') {
                            // 각 옆면(삼각형)
                            for (let i = 0; i < shape.n; i++) {
                                const a1 = (i / shape.n) * Math.PI * 2;
                                const a2 = ((i + 1) / shape.n) * Math.PI * 2;
                                const x1 = Math.sin(a1) * r, z1 = Math.cos(a1) * r;
                                const x2 = Math.sin(a2) * r, z2 = Math.cos(a2) * r;
                                const sGeo = new THREE.BufferGeometry();
                                const verts = new Float32Array([
                                    0, ht/2, 0,
                                    x1, -ht/2, z1,
                                    x2, -ht/2, z2
                                ]);
                                sGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
                                sGeo.setIndex([0, 1, 2]);
                                sGeo.computeVertexNormals();
                                disposables.push(sGeo);
                                group.add(new THREE.Mesh(sGeo, sideMat));
                            }
                        }
                    }

                    // 밑면 강조 - 노란색 (옆면과 명확히 구분되는 강조색)
                    if (highlight === 'base' && !special && !interactive) {
                        const baseGeo = createNgonGeometry(r, shape.n);
                        disposables.push(baseGeo);
                        const baseMat = new THREE.MeshBasicMaterial({
                            color: 0xfbbf24,
                            side: THREE.DoubleSide,
                            transparent: true,
                            opacity: 0.9,
                            polygonOffset: true,
                            polygonOffsetFactor: -2,
                            polygonOffsetUnits: -2
                        });
                        disposables.push(baseMat);
                        if (shape.type === 'prism') {
                            const topMesh = new THREE.Mesh(baseGeo, baseMat);
                            topMesh.position.y = ht / 2 + 0.002;
                            group.add(topMesh);
                            const botMesh = new THREE.Mesh(baseGeo, baseMat);
                            botMesh.position.y = -ht / 2 - 0.002;
                            group.add(botMesh);
                        } else if (shape.type === 'pyramid') {
                            const botMesh = new THREE.Mesh(baseGeo, baseMat);
                            botMesh.position.y = -ht / 2 - 0.002;
                            group.add(botMesh);
                        }
                    }

                    // 꼭짓점 강조
                    if (highlight === 'vertex' && !special && !interactive) {
                        const positions = [];
                        if (shape.type === 'prism') {
                            for (let i = 0; i < shape.n; i++) {
                                const a = (i / shape.n) * Math.PI * 2;
                                positions.push([Math.sin(a) * r, ht / 2, Math.cos(a) * r]);
                                positions.push([Math.sin(a) * r, -ht / 2, Math.cos(a) * r]);
                            }
                        } else if (shape.type === 'pyramid') {
                            positions.push([0, ht / 2, 0]);
                            for (let i = 0; i < shape.n; i++) {
                                const a = (i / shape.n) * Math.PI * 2;
                                positions.push([Math.sin(a) * r, -ht / 2, Math.cos(a) * r]);
                            }
                        }
                        const sphereGeo = new THREE.SphereGeometry(0.14, 16, 16);
                        const sphereMat = new THREE.MeshBasicMaterial({ color: 0xef4444, depthTest: false });
                        disposables.push(sphereGeo, sphereMat);
                        positions.forEach(p => {
                            const s = new THREE.Mesh(sphereGeo, sphereMat);
                            s.position.set(p[0], p[1], p[2]);
                            s.renderOrder = 3;
                            group.add(s);
                        });
                    }

                    // 모서리 강조 - 보이는 모서리(실선)만 빨간색으로 (가려진 모서리는 점선 검정 그대로)
                    if (highlight === 'edge' && !special && !interactive) {
                        solidMat.color.setHex(0xef4444);
                        // 보이는 모서리에 빨간 굵은 튜브 추가 (depthTest로 가려진 부분은 mesh가 가림)
                        const pts = edges.attributes.position.array;
                        const tubeMat = new THREE.MeshBasicMaterial({
                            color: 0xef4444,
                            polygonOffset: true,
                            polygonOffsetFactor: -1.0,
                            polygonOffsetUnits: -1.0
                        });
                        disposables.push(tubeMat);
                        for (let i = 0; i < pts.length; i += 6) {
                            const v1 = new THREE.Vector3(pts[i], pts[i + 1], pts[i + 2]);
                            const v2 = new THREE.Vector3(pts[i + 3], pts[i + 4], pts[i + 5]);
                            const dir = new THREE.Vector3().subVectors(v2, v1);
                            const len = dir.length();
                            const tubeGeo = new THREE.CylinderGeometry(0.035, 0.035, len, 6);
                            disposables.push(tubeGeo);
                            const tube = new THREE.Mesh(tubeGeo, tubeMat);
                            tube.position.copy(v1).add(v2).multiplyScalar(0.5);
                            tube.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
                            tube.renderOrder = 3;
                            group.add(tube);
                        }
                    }

                    // ============ 클릭으로 직접 찾기 (interactive 모드) ============
                    // 부분을 직접 클릭하면 색이 변하고 onPartClick(type) 호출
                    const raycaster = new THREE.Raycaster();
                    const pointer = new THREE.Vector2();
                    const clickProxies = [];      // 꼭짓점/모서리: 클릭 가능한 중립색 프록시
                    let baseShown = false, sideShown = false, firstProxyFired = false;

                    const addBaseOverlay = () => {
                        if (baseShown) return; baseShown = true;
                        const baseGeo = createNgonGeometry(r, shape.n);
                        disposables.push(baseGeo);
                        const baseMat = new THREE.MeshBasicMaterial({ color: 0xfbbf24, side: THREE.DoubleSide, transparent: true, opacity: 0.9, polygonOffset: true, polygonOffsetFactor: -2, polygonOffsetUnits: -2 });
                        disposables.push(baseMat);
                        const ys = shape.type === 'prism' ? [ht/2 + 0.002, -ht/2 - 0.002] : [-ht/2 - 0.002];
                        ys.forEach(y => { const m = new THREE.Mesh(baseGeo, baseMat); m.position.y = y; group.add(m); });
                    };
                    const addSideOverlay = () => {
                        if (sideShown) return; sideShown = true;
                        const sideMat = new THREE.MeshBasicMaterial({ color: darkenColor(color, 0.55), side: THREE.DoubleSide, transparent: true, opacity: 0.85, polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1 });
                        disposables.push(sideMat);
                        for (let i = 0; i < shape.n; i++) {
                            const a1 = (i/shape.n)*Math.PI*2, a2 = ((i+1)/shape.n)*Math.PI*2;
                            const x1 = Math.sin(a1)*r, z1 = Math.cos(a1)*r, x2 = Math.sin(a2)*r, z2 = Math.cos(a2)*r;
                            const sGeo = new THREE.BufferGeometry();
                            const verts = shape.type === 'prism'
                                ? new Float32Array([x1,ht/2,z1, x2,ht/2,z2, x2,-ht/2,z2, x1,-ht/2,z1])
                                : new Float32Array([0,ht/2,0, x1,-ht/2,z1, x2,-ht/2,z2]);
                            sGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
                            sGeo.setIndex(shape.type === 'prism' ? [0,1,2,0,2,3] : [0,1,2]);
                            sGeo.computeVertexNormals();
                            disposables.push(sGeo);
                            group.add(new THREE.Mesh(sGeo, sideMat));
                        }
                    };

                    if (interactive && !special) {
                        if (highlight === 'vertex') {
                            const positions = [];
                            if (shape.type === 'prism') {
                                for (let i = 0; i < shape.n; i++) { const a = (i/shape.n)*Math.PI*2; positions.push([Math.sin(a)*r, ht/2, Math.cos(a)*r]); positions.push([Math.sin(a)*r, -ht/2, Math.cos(a)*r]); }
                            } else { positions.push([0, ht/2, 0]); for (let i = 0; i < shape.n; i++) { const a = (i/shape.n)*Math.PI*2; positions.push([Math.sin(a)*r, -ht/2, Math.cos(a)*r]); } }
                            const sphereGeo = new THREE.SphereGeometry(0.16, 16, 16);
                            disposables.push(sphereGeo);
                            positions.forEach(p => {
                                const m = new THREE.MeshBasicMaterial({ color: 0x94a3b8, depthTest: false });
                                disposables.push(m);
                                const s = new THREE.Mesh(sphereGeo, m);
                                s.position.set(p[0], p[1], p[2]); s.renderOrder = 3;
                                group.add(s); clickProxies.push(s);
                            });
                        } else if (highlight === 'edge') {
                            const pts = edges.attributes.position.array;
                            for (let i = 0; i < pts.length; i += 6) {
                                const v1 = new THREE.Vector3(pts[i], pts[i+1], pts[i+2]);
                                const v2 = new THREE.Vector3(pts[i+3], pts[i+4], pts[i+5]);
                                const dir = new THREE.Vector3().subVectors(v2, v1); const len = dir.length();
                                const tubeGeo = new THREE.CylinderGeometry(0.05, 0.05, len, 6); disposables.push(tubeGeo);
                                const m = new THREE.MeshBasicMaterial({ color: 0x94a3b8 }); disposables.push(m);
                                const tube = new THREE.Mesh(tubeGeo, m);
                                tube.position.copy(v1).add(v2).multiplyScalar(0.5);
                                tube.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
                                tube.renderOrder = 3; group.add(tube); clickProxies.push(tube);
                            }
                        }
                    }

                    const pickAt = (cx, cy) => {
                        if (!interactive || !renderer) return;
                        const rect = renderer.domElement.getBoundingClientRect();
                        pointer.x = ((cx - rect.left) / rect.width) * 2 - 1;
                        pointer.y = -((cy - rect.top) / rect.height) * 2 + 1;
                        raycaster.setFromCamera(pointer, camera);
                        let found = null;
                        if (highlight === 'base' || highlight === 'side') {
                            const hit = raycaster.intersectObject(mesh, false)[0];
                            if (hit && hit.face) {
                                const ny = Math.abs(hit.face.normal.y);
                                // 처음 찾았을 때만 팝업(found) - 이미 색칠됐으면 조용히
                                if (highlight === 'base' && ny > 0.6 && !baseShown) { addBaseOverlay(); found = 'base'; }
                                else if (highlight === 'side' && ny <= 0.6 && !sideShown) { addSideOverlay(); found = 'side'; }
                            }
                        } else if (clickProxies.length) {
                            const hit = raycaster.intersectObjects(clickProxies, false)[0];
                            if (hit) {
                                hit.object.material.color.setHex(0xef4444); // 클릭한 점/선 색칠
                                if (!firstProxyFired) { found = highlight; firstProxyFired = true; }
                            }
                        }
                        if (found && cbRef.current) cbRef.current(found);
                    };

                    group.rotation.y = 0.5;
                    group.rotation.x = 0.18;

                    // 인터랙션 (드래그 회전 + interactive 모드에서는 탭으로 부분 선택)
                    let isDragging = false;
                    let prev = { x: 0, y: 0 };
                    let downXY = null, movedDist = 0;
                    const getXY = (e) => ({
                        x: e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0].clientX),
                        y: e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0].clientY)
                    });
                    const onStart = (e) => { isDragging = true; prev = getXY(e); downXY = prev; movedDist = 0; e.preventDefault && e.preventDefault(); };
                    const onMove = (e) => {
                        if (!isDragging) return;
                        const xy = getXY(e);
                        movedDist += Math.abs(xy.x - prev.x) + Math.abs(xy.y - prev.y);
                        group.rotation.y += (xy.x - prev.x) * 0.01;
                        group.rotation.x += (xy.y - prev.y) * 0.01;
                        prev = xy;
                    };
                    const onEnd = () => {
                        if (isDragging && interactive && downXY && movedDist < 6) pickAt(downXY.x, downXY.y);
                        isDragging = false; downXY = null;
                    };
                    const el = mountRef.current;
                    el.addEventListener('mousedown', onStart);
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onEnd);
                    el.addEventListener('touchstart', onStart, { passive: false });
                    window.addEventListener('touchmove', onMove, { passive: false });
                    window.addEventListener('touchend', onEnd);

                    const animate = () => {
                        if (renderer && scene && camera) renderer.render(scene, camera);
                        frameId = requestAnimationFrame(animate);
                    };
                    animate();

                    stateRef.current.cleanup = () => {
                        try { el.removeEventListener('mousedown', onStart); } catch (e) {}
                        window.removeEventListener('mousemove', onMove);
                        window.removeEventListener('mouseup', onEnd);
                        try { el.removeEventListener('touchstart', onStart); } catch (e) {}
                        window.removeEventListener('touchmove', onMove);
                        window.removeEventListener('touchend', onEnd);
                        cancelAnimationFrame(frameId);
                        disposables.forEach(d => { try { d.dispose && d.dispose(); } catch (e) {} });
                        if (renderer) {
                            try { renderer.dispose(); } catch (e) {}
                            try { if (renderer.forceContextLoss) renderer.forceContextLoss(); } catch (e) {}
                            // DOM 제거는 React에 맡김 (wrapper div unmount 시 자동 정리됨)
                            // 직접 removeChild 호출하지 않음 - React와 충돌 방지
                            renderer = null;
                        }
                    };
                    initialized = true;
                };

                // 컨테이너 크기 확보 후 초기화 시도
                const tryInit = () => {
                    if (!isMounted || initialized || !mountRef.current) return;
                    const w = mountRef.current.clientWidth;
                    const h = mountRef.current.clientHeight;
                    if (w > 0 && h > 0) {
                        initThree(w, h);
                    } else {
                        frameId = requestAnimationFrame(tryInit);
                    }
                };
                tryInit();

                // ResizeObserver - 컨테이너 크기 변화/지연 마운트 시 초기화 보장
                if (typeof ResizeObserver !== 'undefined' && mountRef.current) {
                    ro = new ResizeObserver(() => {
                        if (!isMounted || !mountRef.current) return;
                        const w = mountRef.current.clientWidth;
                        const h = mountRef.current.clientHeight;
                        if (!initialized && w > 0 && h > 0) {
                            initThree(w, h);
                        } else if (initialized && camera && renderer && w > 0 && h > 0) {
                            camera.aspect = w / h;
                            camera.updateProjectionMatrix();
                            renderer.setSize(w, h);
                        }
                    });
                    ro.observe(mountRef.current);
                }

                return () => {
                    isMounted = false;
                    if (ro) ro.disconnect();
                    if (stateRef.current.cleanup) stateRef.current.cleanup();
                };
            }, [shape, color, highlight, special, interactive]);

            // dangerouslySetInnerHTML로 React가 children reconciliation 안 하게 → Three.js canvas와 충돌 방지
            return <div ref={mountRef} className="w-full h-full cursor-grab active:cursor-grabbing" dangerouslySetInnerHTML={{__html: ''}} />;
        }

        // ============ 단계별 힌트 버튼 (중간 장치 포함) ============
        // 흐름: ① 글을 먼저 써야 힌트1을 열 수 있음
        //       ② 힌트1을 보고 답을 다시 고쳐 써야 힌트2가 열림
        // 버튼에 마우스를 올리면 현재 단계의 힌트 내용/안내가 말풍선으로 보임
        function HintBox({ hints, value = '' }) {
            const [level, setLevel] = useState(0);        // 0=닫힘, 1=힌트1, 2=힌트2
            const [snapshot, setSnapshot] = useState('');  // 마지막으로 힌트를 연 시점의 글 내용
            const labels = ['키워드', '문장 완성'];

            const written = (value || '').trim();
            const changed = written !== snapshot.trim();

            // 다음 단계를 열 수 있는 조건 + 잠겨 있을 때 안내 문구
            let canAdvance, lockMsg;
            if (level === 0) {
                canAdvance = written.length > 0;
                lockMsg = '먼저 너의 생각을 한 줄이라도 적어야 힌트가 열려!';
            } else if (level < hints.length) {
                canAdvance = changed;
                lockMsg = '힌트를 참고해서 답을 더 고쳐 적으면 다음 힌트가 열려!';
            } else {
                canAdvance = true; // 마지막 단계 → 누르면 닫힘
                lockMsg = '';
            }
            const locked = level < hints.length && !canAdvance;

            const handleClick = () => {
                if (level >= hints.length) { setLevel(0); return; } // 닫기
                if (!canAdvance) return;                            // 잠김 → 무시
                setLevel(level + 1);
                setSnapshot(value || '');
            };

            // 마우스를 올렸을 때 보일 내용
            const tipTitle = level > 0 ? `힌트 ${level} · ${labels[level - 1]}` : '힌트';
            const tipBody = level > 0 ? hints[level - 1] : (lockMsg || '버튼을 누르면 힌트가 열려요!');
            const suffix = locked ? ' 🔒' : (level === 0 ? '' : (level < hints.length ? ' ▸' : ' ✕'));

            return (
                <span className="relative group inline-flex items-center align-middle">
                    <button type="button" onClick={handleClick}
                        className={`ml-1 px-2 py-0.5 rounded-md text-xs font-bold whitespace-nowrap shrink-0 border-2 ${locked ? 'bg-gray-100 border-gray-300 text-gray-400 cursor-not-allowed' : 'bg-yellow-300 border-yellow-500 text-yellow-900 hover:bg-yellow-400'}`}>
                        💡 {level === 0 ? '힌트' : `힌트 ${level}`}{suffix}
                    </button>
                    <span className="pointer-events-none absolute left-0 top-full mt-1 w-64 z-50 opacity-0 group-hover:opacity-100 transition-opacity bg-amber-900 text-white text-sm leading-snug rounded-lg p-2 shadow-xl whitespace-normal break-keep text-left">
                        <span className="block text-yellow-300 text-xs mb-0.5">{tipTitle}</span>
                        {tipBody}
                        {locked && level > 0 && (
                            <span className="block text-yellow-200 text-xs mt-1">✍️ {lockMsg}</span>
                        )}
                    </span>
                </span>
            );
        }

        // ============================================================
        //         MISSION 1: 도형 분류소 (외연적 정의 활동)
        //   페이지 1: 개념 설명 / 페이지 2: 한 개씩 드래그 분류 / 페이지 3: 정리
        // ============================================================
        function ClassifyView({ onComplete, onBack }) {
            const TOTAL = 2;
            const [page, setPage] = useState(1);
            const [popup, setPopup] = useState(null);
            // 페이지 2: 한 개씩 분류 + 정리
            const shuffled = useMemo(() => [...CLASSIFY_ITEMS].sort(() => Math.random() - 0.5), []);
            const [idx, setIdx] = useState(0);
            const [classified, setClassified] = useState([]);
            const [dragging, setDragging] = useState(false);
            const [hoverSide, setHoverSide] = useState(null);
            // 정리
            const [common, setCommon] = useState('');
            const [diffPrism, setDiffPrism] = useState('');   // 차이점 - 각기둥은~
            const [diffPyramid, setDiffPyramid] = useState(''); // 차이점 - 각뿔은~

            const current = shuffled[idx];
            const allClassified = classified.length >= shuffled.length;

            // page 범위 안전 가드 (빈 화면 방지)
            useEffect(() => {
                if (page < 1 || page > TOTAL) setPage(1);
            }, [page]);
            const summaryDone = common.trim().length > 0 && diffPrism.trim().length > 0 && diffPyramid.trim().length > 0;

            const handleDrop = (side) => {
                setDragging(false);
                setHoverSide(null);
                if (!current) return;
                const correct = current.kind === side;
                if (correct) {
                    const isLast = idx >= shuffled.length - 1;
                    const dropped = { ...current, slot: side, correct: true };
                    // 함수형 업데이트로 stale closure 방지 + 중복 분류 방지
                    setClassified(prev => {
                        if (prev.some(c => c.id === dropped.id)) return prev;
                        return [...prev, dropped];
                    });
                    setPopup({ type: 'success', msg: isLast ? '모든 도형 분류 완료! 🎉\n이제 공통점과 차이점을 적어보세요!' : `정답! 🎉\n${current.name}은(는) ${side === 'prism' ? '각기둥' : '각뿔'}이에요!` });
                    setTimeout(() => {
                        setPopup(null);
                        if (!isLast) setIdx(prev => prev + 1);
                    }, 1100);
                } else {
                    setPopup({ type: 'error', msg: `다시 생각해보세요!\n${side === 'prism' ? '각기둥' : '각뿔'}이 맞나요?` });
                }
            };

            const resetClassify = () => {
                setIdx(0);
                setClassified([]);
                setCommon('');
                setDiffPrism('');
                setDiffPyramid('');
            };

            // ----------- 페이지 1: 개념 설명 -----------
            if (page === 1) {
                return (
                    <div className="h-full flex flex-col p-3 paper-bg overflow-hidden">
                        <Popup {...(popup || {})} onClose={() => setPopup(null)} />
                        <MissionHeader mNum="1" mTitle="도형 친구들을 만나봐요!" page={1} total={TOTAL} icon="BookOpen" iconBg="bg-amber-400" onBack={onBack} />
                        <AvatarGuide char="guard" text={
                            <span className="text-lg leading-relaxed">
                                "도형 왕국에는 두 종류의 마을이 있단다. <b className="text-emerald-700">각기둥 마을</b>과 <b className="text-rose-700">각뿔 마을</b>이지! 마우스를 클릭해 도형을 돌리며 잘 살펴봐."
                            </span>
                        } />

                        <div className="grid grid-cols-2 gap-3 flex-1 mb-2 min-h-0">
                            <div className="bg-amber-50 ink-border border-amber-500 rounded-2xl p-3 stamp-shadow flex flex-col min-h-0">
                                <div className="flex items-center gap-2 mb-2 shrink-0">
                                    <div className="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center text-white ink-border shrink-0">
                                        <Icon name="Box" className="w-6 h-6" />
                                    </div>
                                    <h3 className="font-jua text-3xl text-amber-900 whitespace-nowrap">각기둥</h3>
                                </div>
                                <div className="flex-1 bg-white rounded-xl border-2 border-amber-300 overflow-hidden" style={{ minHeight: '250px' }}>
                                    <Shape3DViewer shape={PRISMS[0]} color={0xf59e0b} />
                                </div>
                                <div className="mt-2 paper-bg p-2 rounded-xl border-2 border-amber-300 font-jua text-lg text-amber-900 leading-snug shrink-0">
                                    📌 <span className="hl-key">위·아래</span>에 <span className="hl-key">모양·크기가 같은 두 면</span>이 있고, <span className="hl-key">옆면</span>은 모두 <span className="hl-key">직사각형</span>인 도형
                                </div>
                            </div>
                            <div className="bg-rose-50 ink-border border-rose-500 rounded-2xl p-3 stamp-shadow flex flex-col min-h-0">
                                <div className="flex items-center gap-2 mb-2 shrink-0">
                                    <div className="w-10 h-10 bg-rose-500 rounded-xl flex items-center justify-center text-white ink-border shrink-0">
                                        <Icon name="Triangle" className="w-6 h-6" />
                                    </div>
                                    <h3 className="font-jua text-3xl text-rose-900 whitespace-nowrap">각뿔</h3>
                                </div>
                                <div className="flex-1 bg-white rounded-xl border-2 border-rose-300 overflow-hidden" style={{ minHeight: '250px' }}>
                                    <Shape3DViewer shape={PYRAMIDS[0]} color={0xf43f5e} />
                                </div>
                                <div className="mt-2 paper-bg p-2 rounded-xl border-2 border-rose-300 font-jua text-lg text-rose-900 leading-snug shrink-0">
                                    📌 <span className="hl-key">아래</span>는 <span className="hl-key">다각형 한 개</span>, 위는 <b>한 점</b>으로 모이고 <span className="hl-key">옆면</span>은 모두 <span className="hl-key">삼각형</span>인 도형
                                </div>
                            </div>
                        </div>

                        <PageNav page={1} total={TOTAL} onNext={() => setPage(2)} canNext={true} />
                    </div>
                );
            }

            // ----------- 페이지 2: 한 개씩 분류 -----------
            if (page === 2) {
                const prismItems = classified.filter(c => c.slot === 'prism');
                const pyramidItems = classified.filter(c => c.slot === 'pyramid');
                const extraInfo = (
                    <div className="ml-2 flex items-center gap-2 shrink-0">
                        <div className="w-32 h-2.5 bg-amber-100 rounded-full overflow-hidden border border-amber-300">
                            <div className="h-full bg-amber-500 transition-all" style={{ width: `${(classified.length / shuffled.length) * 100}%` }} />
                        </div>
                        <span className="font-jua text-sm text-amber-900 whitespace-nowrap">{classified.length}/{shuffled.length}</span>
                        <button onClick={resetClassify} className="px-2 py-0.5 bg-white border-2 border-amber-300 rounded-md text-xs font-bold text-amber-700 hover:bg-amber-50 whitespace-nowrap">
                            <Icon name="RotateCcw" className="w-3 h-3 inline" /> 다시
                        </button>
                    </div>
                );

                return (
                    <div className="h-full flex flex-col p-3 paper-bg overflow-hidden">
                        <Popup {...(popup || {})} onClose={() => setPopup(null)} />
                        <MissionHeader mNum="1" mTitle="도형을 분류해보세요!" page={2} total={TOTAL} icon="Layers" iconBg="bg-amber-400" extra={extraInfo} onBack={onBack} />
                        <div className="bg-amber-100/70 ink-border border-amber-400 rounded-lg px-3 py-2 stamp-shadow mb-2 shrink-0 flex items-center gap-3">
                            <div className="text-3xl shrink-0">🧭</div>
                            <div className="font-gaegu text-lg text-amber-900 flex-1 leading-snug">
                                "길 잃은 도형 친구들이야! <b className="text-emerald-700">각기둥</b>은 왼쪽 마을로, <b className="text-rose-700">각뿔</b>은 오른쪽 마을로 보내줘."
                            </div>
                        </div>

                        {/* 좌: 각기둥 박스 / 중앙: 현재 도형 / 우: 각뿔 박스 */}
                        <div className="grid grid-cols-7 gap-3 flex-1 mb-2 min-h-0">
                            {/* 각기둥 박스 */}
                            <div
                                onDragOver={(e) => { e.preventDefault(); setHoverSide('prism'); }}
                                onDragLeave={() => setHoverSide(null)}
                                onDrop={() => handleDrop('prism')}
                                className={`col-span-2 bg-amber-50 ink-border border-amber-500 border-[4px] border-dashed rounded-2xl flex flex-col p-3 ${hoverSide === 'prism' ? 'drop-zone-active' : ''}`}>
                                <div className="flex items-center gap-2 mb-2 shrink-0">
                                    <div className="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center text-white ink-border">
                                        <Icon name="Box" className="w-6 h-6" />
                                    </div>
                                    <h3 className="font-jua text-2xl text-amber-900">각기둥</h3>
                                </div>
                                <div className="paper-bg p-2 rounded-lg border border-amber-300 font-jua text-base text-amber-900 leading-snug mb-2 shrink-0">
                                    📌 <span className="hl-key">위·아래</span>에 <span className="hl-key">모양과 크기가 같은 두 면</span>이 있고, <span className="hl-key">옆면</span>은 모두 <span className="hl-key">직사각형</span>인 도형
                                </div>
                                <div className="flex-1 bg-white/50 rounded-xl border-2 border-amber-300 p-2 min-h-0 overflow-hidden">
                                    {prismItems.length === 0 ? (
                                        <div className="h-full flex items-center justify-center text-amber-400 text-sm text-center">
                                            아직 분류된 도형이<br/>없어요
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-2 gap-2 h-full content-start">
                                            {prismItems.map(c => (
                                                <div key={c.id} className="bg-white rounded-lg border-2 border-amber-600 p-1 flex flex-col items-center stamp-shadow">
                                                    <div className="w-full h-16">
                                                        <MiniShape3D shape={c.shape} color={c.color} />
                                                    </div>
                                                    <div className="text-xs font-bold text-amber-900 whitespace-nowrap">{c.name}</div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* 중앙: 분류 중 → 현재 도형 / 분류 완료 → 공통점/차이점 폼 */}
                            <div className="col-span-3 bg-white ink-border rounded-2xl stamp-shadow flex flex-col p-3 relative min-h-0">
                                {!allClassified && current ? (
                                    <>
                                        <div className="text-base font-bold text-amber-700 mb-1 shrink-0 whitespace-nowrap text-center">
                                            이 도형은 어디에 속할까요?
                                        </div>
                                        <div className="font-jua text-3xl text-amber-900 mb-2 shrink-0 whitespace-nowrap text-center">{current.name}</div>
                                        <div
                                            draggable
                                            onDragStart={(e) => {
                                                setDragging(true);
                                                // 일부 브라우저는 setData가 없으면 drag 안 시작됨
                                                try { e.dataTransfer.setData('text/plain', current.id); } catch (err) {}
                                                try { e.dataTransfer.effectAllowed = 'move'; } catch (err) {}
                                            }}
                                            onDragEnd={() => { setDragging(false); setHoverSide(null); }}
                                            className={`draggable-card flex-1 w-full bg-amber-50/30 rounded-xl border-2 border-amber-300 cursor-grab active:cursor-grabbing min-h-0 relative ${dragging ? 'opacity-50 scale-95' : ''}`}>
                                            <MiniShape3D shape={current.shape} color={current.color} />
                                            {/* 투명 오버레이 - Three.js canvas가 drag 이벤트 가로채지 못하게 */}
                                            <div className="absolute inset-0" style={{ cursor: 'grab' }} />
                                        </div>
                                        <div className="text-base text-amber-700 mt-2 shrink-0 whitespace-nowrap text-center">
                                            ✋ 도형을 좌/우 박스로 드래그하세요!
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <div className="text-center shrink-0 mb-2">
                                            <Icon name="PartyPopper" className="w-10 h-10 text-amber-500 inline" />
                                            <span className="font-jua text-xl text-amber-900 ml-2 whitespace-nowrap">분류 완료! 분류된 도형을 보며 정리해요</span>
                                        </div>
                                        <div className="flex-1 min-h-0 grid grid-rows-2 gap-2">
                                            <div className="flex flex-col min-h-0">
                                                <label className="text-base font-jua text-emerald-700 mb-1 flex items-center gap-1 shrink-0 whitespace-nowrap">
                                                    <div className="w-3 h-3 rounded-full bg-emerald-500"/> 공통점 (두 종류 도형의 같은 점)
                                                    <HintBox value={common} hints={[
                                                        '키워드: 평평한 면 · 다각형 ·  옆면 수 = 밑면 변의 수',
                                                        '각기둥과 각뿔은 모두 □□한 면(다각형)으로 둘러싸여 있고, 옆면의 수가 밑면의 변의 수와 □□.'
                                                    ]} />
                                                </label>
                                                <textarea value={common} onChange={e => setCommon(e.target.value)}
                                                    className="w-full flex-1 p-2 border-2 border-emerald-200 rounded-xl resize-none outline-none focus:border-emerald-400 text-base"
                                                    placeholder="예) 모두 평평한 면(다각형)으로만 둘러싸여 있다..." />
                                            </div>
                                            <div className="flex flex-col min-h-0">
                                                <label className="text-base font-jua text-rose-700 mb-1 flex items-center gap-2 shrink-0 whitespace-nowrap">
                                                    <div className="w-3 h-3 rounded-full bg-rose-500"/> 차이점 (각기둥 ↔ 각뿔의 다른 점)
                                                </label>
                                                <div className="flex-1 min-h-0 grid grid-cols-2 gap-2">
                                                    <div className="flex flex-col min-h-0">
                                                        <div className="text-sm font-jua text-emerald-700 mb-0.5 flex items-center gap-1 shrink-0 whitespace-nowrap">
                                                            각기둥은...
                                                            <HintBox value={diffPrism} hints={[
                                                                '키워드: 밑면 2개 · 옆면은 직사각형',
                                                                '각기둥은 밑면이 □개이고, 옆면이 모두 □□□형이다.'
                                                            ]} />
                                                        </div>
                                                        <textarea value={diffPrism} onChange={e => setDiffPrism(e.target.value)}
                                                            className="w-full flex-1 p-2 border-2 border-emerald-200 rounded-xl resize-none outline-none focus:border-emerald-400 text-sm"
                                                            placeholder="예) 밑면이 2개이고, 옆면이 직사각형이다..." />
                                                    </div>
                                                    <div className="flex flex-col min-h-0">
                                                        <div className="text-sm font-jua text-rose-700 mb-0.5 flex items-center gap-1 shrink-0 whitespace-nowrap">
                                                            각뿔은...
                                                            <HintBox value={diffPyramid} hints={[
                                                                <span>키워드: 밑면 1개 · 옆면은 삼각형 · <span className="whitespace-nowrap">한 점에서 만남</span></span>,
                                                                <span>각뿔은 밑면이 □개이고, 옆면이 모두 □□형이며 <span className="whitespace-nowrap">위의 한 □에서</span> 만난다.</span>
                                                            ]} />
                                                        </div>
                                                        <textarea value={diffPyramid} onChange={e => setDiffPyramid(e.target.value)}
                                                            className="w-full flex-1 p-2 border-2 border-rose-200 rounded-xl resize-none outline-none focus:border-rose-400 text-sm"
                                                            placeholder="예) 밑면이 1개이고, 옆면이 삼각형이며 한 점에서 만난다..." />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>

                            {/* 각뿔 박스 */}
                            <div
                                onDragOver={(e) => { e.preventDefault(); setHoverSide('pyramid'); }}
                                onDragLeave={() => setHoverSide(null)}
                                onDrop={() => handleDrop('pyramid')}
                                className={`col-span-2 bg-rose-50 ink-border border-rose-500 border-[4px] border-dashed rounded-2xl flex flex-col p-3 ${hoverSide === 'pyramid' ? 'drop-zone-active' : ''}`}>
                                <div className="flex items-center gap-2 mb-2 shrink-0">
                                    <div className="w-10 h-10 bg-rose-500 rounded-xl flex items-center justify-center text-white ink-border">
                                        <Icon name="Triangle" className="w-6 h-6" />
                                    </div>
                                    <h3 className="font-jua text-2xl text-rose-900">각뿔</h3>
                                </div>
                                <div className="paper-bg p-2 rounded-lg border border-rose-300 font-jua text-base text-rose-900 leading-snug mb-2 shrink-0">
                                    📌 <span className="hl-key">아래</span>는 <span className="hl-key">다각형 한 개</span>, 위는 <b>한 점</b>으로 모이고 <span className="hl-key">옆면</span>은 모두 <span className="hl-key">삼각형</span>인 도형
                                </div>
                                <div className="flex-1 bg-white/50 rounded-xl border-2 border-rose-300 p-2 min-h-0 overflow-hidden">
                                    {pyramidItems.length === 0 ? (
                                        <div className="h-full flex items-center justify-center text-rose-400 text-sm text-center">
                                            아직 분류된 도형이<br/>없어요
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-2 gap-2 h-full content-start">
                                            {pyramidItems.map(c => (
                                                <div key={c.id} className="bg-white rounded-lg border-2 border-rose-600 p-1 flex flex-col items-center stamp-shadow">
                                                    <div className="w-full h-16">
                                                        <MiniShape3D shape={c.shape} color={c.color} />
                                                    </div>
                                                    <div className="text-xs font-bold text-rose-900 whitespace-nowrap">{c.name}</div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        <PageNav page={2} total={TOTAL} onPrev={() => setPage(1)} onComplete={onComplete}
                            canNext={allClassified && summaryDone}
                            completeLabel="완료" />
                    </div>
                );
            }

            return null;
        }

        // ============================================================
        //   MISSION 2 & 3 공통: 입체도형 탐험 (각기둥/각뿔)
        // ============================================================
        function ShapeExploreView({ kind, onComplete, onBack }) {
            const SHAPES = kind === 'prism' ? PRISMS : PYRAMIDS;
            const isPrism = kind === 'prism';
            const themeHex = isPrism ? 0x10b981 : 0xf43f5e;
            const villageName = isPrism ? '각기둥 마을' : '각뿔 마을';
            const T = isPrism ? {
                bg50: 'bg-emerald-50', bg100: 'bg-emerald-100', bg500: 'bg-emerald-500',
                bg600: 'bg-emerald-600', bg700: 'bg-emerald-700',
                border200: 'border-emerald-200', border300: 'border-emerald-300',
                border400: 'border-emerald-400', border700: 'border-emerald-700',
                text700: 'text-emerald-700', text900: 'text-emerald-900',
                hoverBg50: 'hover:bg-emerald-50', hoverBg600: 'hover:bg-emerald-600',
                hoverBg700: 'hover:bg-emerald-700', hoverBg800: 'hover:bg-emerald-800',
                from100: 'from-emerald-100', focusBorder600: 'focus:border-emerald-600'
            } : {
                bg50: 'bg-rose-50', bg100: 'bg-rose-100', bg500: 'bg-rose-500',
                bg600: 'bg-rose-600', bg700: 'bg-rose-700',
                border200: 'border-rose-200', border300: 'border-rose-300',
                border400: 'border-rose-400', border700: 'border-rose-700',
                text700: 'text-rose-700', text900: 'text-rose-900',
                hoverBg50: 'hover:bg-rose-50', hoverBg600: 'hover:bg-rose-600',
                hoverBg700: 'hover:bg-rose-700', hoverBg800: 'hover:bg-rose-800',
                from100: 'from-rose-100', focusBorder600: 'focus:border-rose-600'
            };

            const [shape, setShape] = useState(SHAPES[0]);
            const [page, setPage] = useState(1);
            const [highlight, setHighlight] = useState('none');  // 초기 highlight = 'none' (기본 도형)
            const [inputs, setInputs] = useState({
                baseShape: '', baseCount: '', sideShape: '', sideCount: '',
                vertices: '', edges: '', name: '', commonText: ''
            });
            const [partsDone, setPartsDone] = useState({ base: false, side: false, vertex: false, edge: false });
            const [popup, setPopup] = useState(null);
            // 도형의 부분을 클릭했을 때 마을 어른의 말을 크게 띄웠다가 제자리로 보내는 팝업
            const [bigMsg, setBigMsg] = useState(null);
            const [bigMsgSeq, setBigMsgSeq] = useState(0);

        // ============================================================
        //   MISSION 4: 비밀의 규칙 (면, 꼭짓점, 모서리 관계)
        // ============================================================
        function PatternView({ onComplete, onBack }) {
            const [kind, setKind] = useState('prism');
            const [n, setN] = useState(3);
            const [discovered, setDiscovered] = useState({ faces: false, vertices: false, edges: false });
            const [guesses, setGuesses] = useState({ faces: '', vertices: '', edges: '' });
            // 중요 활동: 밑면/옆면의 모양·개수로 도형 이름의 이유 확인
            const [idGuess, setIdGuess] = useState({ baseShape: '', baseCount: '', sideShape: '', sideCount: '' });
            const [idDone, setIdDone] = useState({ baseShape: false, baseCount: false, sideShape: false, sideCount: false });
            const [popup, setPopup] = useState(null);

            const shape = (kind === 'prism' ? PRISMS : PYRAMIDS).find(s => s.n === n);

            const formula = kind === 'prism'
                ? { faces: n => n + 2, vertices: n => n * 2, edges: n => n * 3 }
                : { faces: n => n + 1, vertices: n => n + 1, edges: n => n * 2 };

            const formulaStr = kind === 'prism'
                ? { faces: '(변의 수) + 2', vertices: '(변의 수) × 2', edges: '(변의 수) × 3' }
                : { faces: '(변의 수) + 1', vertices: '(변의 수) + 1', edges: '(변의 수) × 2' };

            const checkGuess = (key) => {
                const expected = formula[key](n);
                const actual = parseInt(guesses[key]);
                if (actual === expected) {
                    setDiscovered({ ...discovered, [key]: true });

            const baseName = NGON_NAMES[n] || (n + '각형');
            const shapeName = baseName.replace('형', '') + (kind === 'prism' ? '기둥' : '뿔');
            const expectBaseCount = kind === 'prism' ? 2 : 1;
            const expectSideShape = kind === 'prism' ? '직사각형' : '삼각형';

            const checkId = (key) => {
                let ok = false;
                if (key === 'baseShape') ok = onlyKorean(idGuess.baseShape) === baseName;
                else if (key === 'baseCount') ok = parseInt(idGuess.baseCount) === expectBaseCount;

            const idAllDone = Object.values(idDone).every(Boolean);

            // 도형 종류/변의 수를 바꾸면 모든 입력 초기화
            const resetAll = () => {
